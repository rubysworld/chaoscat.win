<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANDSTORM — Ruby's Chaos Lab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}
h1 {
  font-size: 1.4em;
  margin: 10px 0 5px;
  color: #f0c040;
  text-shadow: 0 0 10px #f0c04066;
  letter-spacing: 4px;
}
.subtitle { font-size: 0.7em; color: #888; margin-bottom: 8px; }
canvas {
  border: 2px solid #333;
  cursor: crosshair;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 8px 0;
  justify-content: center;
  max-width: 600px;
}
button {
  background: #1a1a2e;
  color: #e0e0e0;
  border: 1px solid #333;
  padding: 6px 14px;
  font-family: inherit;
  font-size: 0.8em;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
}
button:hover { background: #2a2a4e; }
button.active { border-color: #f0c040; color: #f0c040; box-shadow: 0 0 8px #f0c04044; }
.material-btn { min-width: 70px; text-align: center; }
.info {
  font-size: 0.65em;
  color: #666;
  margin-top: 4px;
  text-align: center;
}
.brush-size {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75em;
  color: #999;
}
.brush-size input { width: 80px; accent-color: #f0c040; }
</style>
</head>
<body>
<h1>🏜️ SANDSTORM</h1>
<div class="subtitle">a falling sand simulation by ruby</div>
<canvas id="c"></canvas>
<div class="controls">
  <button class="material-btn active" data-mat="sand">🟡 Sand</button>
  <button class="material-btn" data-mat="water">🔵 Water</button>
  <button class="material-btn" data-mat="fire">🔴 Fire</button>
  <button class="material-btn" data-mat="plant">🟢 Plant</button>
  <button class="material-btn" data-mat="stone">⬜ Stone</button>
  <button class="material-btn" data-mat="acid">🟣 Acid</button>
  <button class="material-btn" data-mat="oil">🟤 Oil</button>
  <button class="material-btn" data-mat="erase">❌ Erase</button>
  <button id="clearBtn">🗑️ Clear</button>
  <button id="pauseBtn">⏸️ Pause</button>
</div>
<div class="controls">
  <div class="brush-size">
    Brush: <input type="range" id="brushSize" min="1" max="12" value="3"> <span id="brushVal">3</span>
  </div>
</div>
<div class="info">click & drag to place materials • sand falls • water flows • fire burns plants & oil • acid dissolves everything • have fun 🐱</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Grid sizing
const CELL = 3;
const W = Math.min(200, Math.floor((window.innerWidth - 20) / CELL));
const H = Math.min(150, Math.floor((window.innerHeight - 180) / CELL));
canvas.width = W * CELL;
canvas.height = H * CELL;

// Materials
const EMPTY = 0, SAND = 1, WATER = 2, FIRE = 3, PLANT = 4, STONE = 5, ACID = 6, OIL = 7, STEAM = 8;

// Grid
let grid = new Uint8Array(W * H);
let colorVar = new Uint8Array(W * H); // color variation per cell
let updated = new Uint8Array(W * H); // prevent double-updates per frame

const idx = (x, y) => y * W + x;
const get = (x, y) => (x >= 0 && x < W && y >= 0 && y < H) ? grid[idx(x, y)] : STONE;
const set = (x, y, v) => { if (x >= 0 && x < W && y >= 0 && y < H) { grid[idx(x, y)] = v; colorVar[idx(x, y)] = Math.random() * 40 | 0; } };

let currentMat = SAND;
let brushRadius = 3;
let paused = false;
let mouseDown = false;
let mouseX = 0, mouseY = 0;
let frameCount = 0;

// Material colors with variation
function getColor(mat, variation) {
  const v = variation || 0;
  switch (mat) {
    case SAND:  return `hsl(${42 + v % 15}, ${75 + v % 20}%, ${55 + v % 15}%)`;
    case WATER: return `hsl(${210 + v % 20}, 70%, ${45 + v % 15}%)`;
    case FIRE:  return `hsl(${v % 40}, 100%, ${50 + (Math.random() * 20 | 0)}%)`;
    case PLANT: return `hsl(${110 + v % 30}, ${60 + v % 30}%, ${30 + v % 20}%)`;
    case STONE: return `hsl(0, 0%, ${35 + v % 20}%)`;
    case ACID:  return `hsl(${280 + v % 30}, 90%, ${40 + (Math.random() * 15 | 0)}%)`;
    case OIL:   return `hsl(30, ${30 + v % 20}%, ${15 + v % 10}%)`;
    case STEAM: return `hsla(200, 20%, ${70 + v % 20}%, ${0.3 + Math.random() * 0.3})`;
    default: return null;
  }
}

// Physics
function simulate() {
  if (paused) return;
  frameCount++;
  updated.fill(0);

  // Process bottom-to-top so falling works correctly
  for (let y = H - 1; y >= 0; y--) {
    // Alternate left-right scan direction for natural flow
    const leftToRight = frameCount % 2 === 0;
    for (let i = 0; i < W; i++) {
      const x = leftToRight ? i : (W - 1 - i);
      const id = idx(x, y);
      if (updated[id]) continue;
      const mat = grid[id];
      if (mat === EMPTY) continue;

      const below = get(x, y + 1);
      const belowL = get(x - 1, y + 1);
      const belowR = get(x + 1, y + 1);
      const left = get(x - 1, y);
      const right = get(x + 1, y);

      if (mat === SAND) {
        if (below === EMPTY || below === WATER || below === OIL) {
          swap(x, y, x, y + 1);
        } else if ((belowL === EMPTY || belowL === WATER || belowL === OIL) && Math.random() < 0.5) {
          swap(x, y, x - 1, y + 1);
        } else if ((belowR === EMPTY || belowR === WATER || belowR === OIL)) {
          swap(x, y, x + 1, y + 1);
        }
      }

      else if (mat === WATER) {
        if (below === EMPTY || below === OIL) {
          swap(x, y, x, y + 1);
        } else if ((belowL === EMPTY || belowL === OIL) && Math.random() < 0.5) {
          swap(x, y, x - 1, y + 1);
        } else if ((belowR === EMPTY || belowR === OIL)) {
          swap(x, y, x + 1, y + 1);
        } else if (left === EMPTY && Math.random() < 0.5) {
          swap(x, y, x - 1, y);
        } else if (right === EMPTY) {
          swap(x, y, x + 1, y);
        }
      }

      else if (mat === OIL) {
        // Oil floats on water but sinks through air
        if (below === EMPTY) {
          swap(x, y, x, y + 1);
        } else if (belowL === EMPTY && Math.random() < 0.5) {
          swap(x, y, x - 1, y + 1);
        } else if (belowR === EMPTY) {
          swap(x, y, x + 1, y + 1);
        } else if (left === EMPTY && Math.random() < 0.4) {
          swap(x, y, x - 1, y);
        } else if (right === EMPTY && Math.random() < 0.4) {
          swap(x, y, x + 1, y);
        }
        // Oil floats on water
        if (below === WATER && Math.random() < 0.3) {
          swap(x, y, x, y + 1);
        }
      }

      else if (mat === FIRE) {
        // Fire rises and spreads
        if (Math.random() < 0.05) {
          set(x, y, EMPTY); // fire dies
          continue;
        }
        // Burn neighbors
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            if (dx === 0 && dy === 0) continue;
            const n = get(x + dx, y + dy);
            if (n === PLANT && Math.random() < 0.15) {
              set(x + dx, y + dy, FIRE);
            }
            if (n === OIL && Math.random() < 0.25) {
              set(x + dx, y + dy, FIRE);
            }
            if (n === WATER) {
              set(x, y, STEAM);
              continue;
            }
          }
        }
        // Rise
        const above = get(x, y - 1);
        if (above === EMPTY && Math.random() < 0.7) {
          swap(x, y, x, y - 1);
        } else if (get(x - 1, y - 1) === EMPTY && Math.random() < 0.3) {
          swap(x, y, x - 1, y - 1);
        } else if (get(x + 1, y - 1) === EMPTY && Math.random() < 0.3) {
          swap(x, y, x + 1, y - 1);
        }
      }

      else if (mat === STEAM) {
        if (Math.random() < 0.02) {
          set(x, y, EMPTY); // steam dissipates
          continue;
        }
        if (y > 0 && Math.random() < 0.03) {
          // Condense back to water sometimes
          set(x, y, WATER);
          continue;
        }
        const above = get(x, y - 1);
        if (above === EMPTY) {
          swap(x, y, x, y - 1);
        } else if (Math.random() < 0.5 && get(x - 1, y) === EMPTY) {
          swap(x, y, x - 1, y);
        } else if (get(x + 1, y) === EMPTY) {
          swap(x, y, x + 1, y);
        }
      }

      else if (mat === ACID) {
        // Acid flows like water but dissolves things
        if (below === EMPTY) {
          swap(x, y, x, y + 1);
        } else if (below !== ACID && below !== EMPTY && Math.random() < 0.1) {
          // Dissolve what's below
          set(x, y + 1, EMPTY);
          if (Math.random() < 0.3) set(x, y, EMPTY); // acid consumed
        } else if (belowL === EMPTY && Math.random() < 0.5) {
          swap(x, y, x - 1, y + 1);
        } else if (belowR === EMPTY) {
          swap(x, y, x + 1, y + 1);
        } else if (left === EMPTY && Math.random() < 0.5) {
          swap(x, y, x - 1, y);
        } else if (right === EMPTY) {
          swap(x, y, x + 1, y);
        }
        // Dissolve neighbors
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            const n = get(x + dx, y + dy);
            if (n !== EMPTY && n !== ACID && Math.random() < 0.02) {
              set(x + dx, y + dy, EMPTY);
              if (Math.random() < 0.15) set(x, y, EMPTY);
            }
          }
        }
      }

      else if (mat === PLANT) {
        // Grow toward water
        if (Math.random() < 0.005) {
          for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
              if (get(x + dx, y + dy) === WATER && Math.random() < 0.3) {
                set(x + dx, y + dy, PLANT);
              }
            }
          }
        }
        // Random growth
        if (Math.random() < 0.001) {
          const dx = (Math.random() * 3 | 0) - 1;
          const dy = (Math.random() * 3 | 0) - 1;
          if (get(x + dx, y + dy) === EMPTY) {
            set(x + dx, y + dy, PLANT);
          }
        }
      }
    }
  }
}

function swap(x1, y1, x2, y2) {
  if (x2 < 0 || x2 >= W || y2 < 0 || y2 >= H) return;
  const i1 = idx(x1, y1), i2 = idx(x2, y2);
  const tmp = grid[i1];
  grid[i1] = grid[i2];
  grid[i2] = tmp;
  const tmpC = colorVar[i1];
  colorVar[i1] = colorVar[i2];
  colorVar[i2] = tmpC;
  updated[i2] = 1;
}

// Render
function render() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const mat = grid[idx(x, y)];
      if (mat === EMPTY) continue;
      const color = getColor(mat, colorVar[idx(x, y)]);
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
    }
  }
}

// Input
function placeMaterial(mx, my) {
  const gx = Math.floor(mx / CELL);
  const gy = Math.floor(my / CELL);
  const r = brushRadius;
  for (let dx = -r; dx <= r; dx++) {
    for (let dy = -r; dy <= r; dy++) {
      if (dx * dx + dy * dy > r * r) continue;
      const px = gx + dx, py = gy + dy;
      if (px < 0 || px >= W || py < 0 || py >= H) continue;
      if (currentMat === EMPTY) {
        set(px, py, EMPTY);
      } else if (get(px, py) === EMPTY) {
        // Don't place every cell for a natural look
        if (Math.random() < 0.6) {
          set(px, py, currentMat);
        }
      }
    }
  }
}

canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  placeMaterial((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
});
canvas.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  placeMaterial((e.clientX - rect.left) * sx, (e.clientY - rect.top) * sy);
});
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouseDown = true;
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const t = e.touches[0];
  placeMaterial((t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const t = e.touches[0];
  placeMaterial((t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy);
}, { passive: false });
canvas.addEventListener('touchend', () => mouseDown = false);

// Buttons
document.querySelectorAll('.material-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.material-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const m = btn.dataset.mat;
    currentMat = { sand: SAND, water: WATER, fire: FIRE, plant: PLANT, stone: STONE, acid: ACID, oil: OIL, erase: EMPTY }[m];
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  grid.fill(0);
  colorVar.fill(0);
});

document.getElementById('pauseBtn').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? '▶️ Play' : '⏸️ Pause';
});

document.getElementById('brushSize').addEventListener('input', function() {
  brushRadius = parseInt(this.value);
  document.getElementById('brushVal').textContent = this.value;
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const keys = { '1': SAND, '2': WATER, '3': FIRE, '4': PLANT, '5': STONE, '6': ACID, '7': OIL, '0': EMPTY };
  if (keys[e.key] !== undefined) {
    currentMat = keys[e.key];
    document.querySelectorAll('.material-btn').forEach(b => {
      const m = b.dataset.mat;
      const matMap = { sand: SAND, water: WATER, fire: FIRE, plant: PLANT, stone: STONE, acid: ACID, oil: OIL, erase: EMPTY };
      b.classList.toggle('active', matMap[m] === currentMat);
    });
  }
  if (e.key === ' ') { e.preventDefault(); paused = !paused; document.getElementById('pauseBtn').textContent = paused ? '▶️ Play' : '⏸️ Pause'; }
  if (e.key === 'c') { grid.fill(0); colorVar.fill(0); }
});

// Main loop
function loop() {
  simulate();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
