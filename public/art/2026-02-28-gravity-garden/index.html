<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Garden 🌀 - chaoscat.win</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=VT323&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; cursor: crosshair; font-family: 'VT323', monospace; }
canvas { display: block; }
#ui {
  position: fixed; top: 16px; left: 16px; z-index: 10;
  color: #0ff; font-size: 16px; pointer-events: none;
}
#title {
  font-family: 'Orbitron', sans-serif; font-size: 28px;
  color: #fff; text-shadow: 0 0 20px #0ff, 0 0 40px #08f;
  margin-bottom: 8px;
}
#subtitle { color: #888; font-size: 14px; margin-bottom: 12px; }
#stats { line-height: 1.6; }
#controls {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 10px; align-items: center;
}
.btn {
  background: transparent; border: 1px solid #0ff; color: #0ff;
  padding: 8px 16px; font-family: 'VT323', monospace; font-size: 16px;
  cursor: pointer; pointer-events: all; transition: all 0.2s;
}
.btn:hover { background: #0ff; color: #000; }
.btn.active { background: #0ff; color: #000; }
#mode-label {
  position: fixed; top: 16px; right: 16px; z-index: 10;
  font-family: 'Orbitron', sans-serif; font-size: 18px;
  color: #0ff; text-shadow: 0 0 10px #0ff;
}
#help {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  z-index: 10; color: #555; font-size: 14px; text-align: center;
  pointer-events: none; transition: opacity 0.5s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">GRAVITY GARDEN</div>
  <div id="subtitle">plant wells. grow orbits. harvest chaos.</div>
  <div id="stats">
    <div>Wells: <span id="s-wells">0</span></div>
    <div>Particles: <span id="s-parts">0</span></div>
    <div>Absorbed: <span id="s-absorbed">0</span></div>
    <div>Energy: <span id="s-energy">0</span></div>
  </div>
</div>
<div id="mode-label">NEBULA</div>
<div id="help">click to plant a gravity well · hold + drag for bigger mass · scroll to adjust particle flow</div>
<div id="controls">
  <button class="btn" id="btn-mode">MODE</button>
  <button class="btn" id="btn-burst">BURST</button>
  <button class="btn" id="btn-trails">TRAILS: ON</button>
  <button class="btn" id="btn-clear">CLEAR</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// State
const wells = [];
const particles = [];
let absorbed = 0;
let particleRate = 3; // per frame
let trails = true;
let mode = 0;
const modes = ['NEBULA', 'SOLAR', 'VOID', 'ELECTRIC', 'BLOOM'];
const modeColors = [
  // NEBULA: purples, blues, pinks
  (t, v) => `hsla(${260 + Math.sin(t*0.001)*40}, 80%, ${40 + v*30}%, ${0.8 + v*0.2})`,
  // SOLAR: warm yellows, oranges, reds
  (t, v) => `hsla(${30 + v*30}, 90%, ${50 + v*20}%, ${0.8 + v*0.2})`,
  // VOID: white/grey with occasional cyan sparks
  (t, v) => `hsla(${180 + Math.random()*40}, ${v > 0.7 ? 80 : 10}%, ${60 + v*30}%, ${0.6 + v*0.4})`,
  // ELECTRIC: cyan, blue, white
  (t, v) => `hsla(${190 + Math.sin(t*0.003)*30}, 90%, ${50 + v*40}%, ${0.7 + v*0.3})`,
  // BLOOM: full rainbow based on angle from nearest well
  (t, v, p) => {
    let hue = (p ? (Math.atan2(p.y - H/2, p.x - W/2) * 180/Math.PI + 360) % 360 : t*0.05 % 360);
    return `hsla(${hue}, 85%, ${45 + v*35}%, ${0.7 + v*0.3})`;
  }
];

// Well colors per mode
const wellColors = [
  (t) => `hsla(${280 + Math.sin(t*0.002)*20}, 70%, 60%, `,
  (t) => `hsla(${40 + Math.sin(t*0.002)*20}, 90%, 60%, `,
  (t) => `hsla(${200}, 5%, 70%, `,
  (t) => `hsla(${200 + Math.sin(t*0.003)*20}, 100%, 70%, `,
  (t) => `hsla(${(t*0.03) % 360}, 80%, 60%, `,
];

class Well {
  constructor(x, y, mass) {
    this.x = x;
    this.y = y;
    this.mass = mass; // 50-500
    this.radius = Math.sqrt(mass) * 1.5;
    this.born = Date.now();
    this.pulse = Math.random() * Math.PI * 2;
  }
}

class Particle {
  constructor(x, y, vx, vy) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.life = 1;
    this.maxLife = 600 + Math.random() * 400;
    this.age = 0;
    this.trail = [];
    this.trailMax = 30;
  }
}

// Spawn particles from edges
function spawnParticle() {
  let x, y, vx, vy;
  const side = Math.random() * 4 | 0;
  const speed = 0.3 + Math.random() * 0.7;
  switch(side) {
    case 0: x = Math.random()*W; y = -5; vx = (Math.random()-0.5)*speed; vy = speed; break;
    case 1: x = W+5; y = Math.random()*H; vx = -speed; vy = (Math.random()-0.5)*speed; break;
    case 2: x = Math.random()*W; y = H+5; vx = (Math.random()-0.5)*speed; vy = -speed; break;
    case 3: x = -5; y = Math.random()*H; vx = speed; vy = (Math.random()-0.5)*speed; break;
  }
  particles.push(new Particle(x, y, vx, vy));
}

function spawnBurst() {
  const cx = W/2, cy = H/2;
  for (let i = 0; i < 200; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 2;
    const dist = 50 + Math.random() * 100;
    particles.push(new Particle(
      cx + Math.cos(angle)*dist,
      cy + Math.sin(angle)*dist,
      Math.cos(angle)*speed,
      Math.sin(angle)*speed
    ));
  }
}

// Mouse interaction
let mouseDown = false;
let mouseStart = null;
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  mouseStart = { x: e.clientX, y: e.clientY, time: Date.now() };
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mouseup', (e) => {
  if (mouseStart) {
    const holdTime = Date.now() - mouseStart.time;
    const mass = Math.min(500, 50 + holdTime * 0.5);
    wells.push(new Well(e.clientX, e.clientY, mass));
    // Spawn some particles near the new well
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      const speed = 1 + Math.random() * 2;
      const tangent = angle + Math.PI/2 + (Math.random()-0.5)*0.5;
      particles.push(new Particle(
        e.clientX + Math.cos(angle)*dist,
        e.clientY + Math.sin(angle)*dist,
        Math.cos(tangent)*speed,
        Math.sin(tangent)*speed
      ));
    }
  }
  mouseDown = false;
  mouseStart = null;
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mouseDown = true;
  mouseStart = { x: t.clientX, y: t.clientY, time: Date.now() };
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (mouseStart) {
    const holdTime = Date.now() - mouseStart.time;
    const mass = Math.min(500, 50 + holdTime * 0.5);
    wells.push(new Well(t.clientX, t.clientY, mass));
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      const speed = 1 + Math.random() * 2;
      const tangent = angle + Math.PI/2 + (Math.random()-0.5)*0.5;
      particles.push(new Particle(
        t.clientX + Math.cos(angle)*dist,
        t.clientY + Math.sin(angle)*dist,
        Math.cos(tangent)*speed,
        Math.sin(tangent)*speed
      ));
    }
  }
  mouseDown = false;
  mouseStart = null;
}, { passive: false });

// Scroll to adjust particle rate
window.addEventListener('wheel', (e) => {
  particleRate = Math.max(0, Math.min(20, particleRate + (e.deltaY > 0 ? -1 : 1)));
});

// Buttons
document.getElementById('btn-mode').addEventListener('click', () => {
  mode = (mode + 1) % modes.length;
  document.getElementById('mode-label').textContent = modes[mode];
});
document.getElementById('btn-burst').addEventListener('click', spawnBurst);
document.getElementById('btn-trails').addEventListener('click', () => {
  trails = !trails;
  document.getElementById('btn-trails').textContent = `TRAILS: ${trails ? 'ON' : 'OFF'}`;
});
document.getElementById('btn-clear').addEventListener('click', () => {
  wells.length = 0;
  particles.length = 0;
  absorbed = 0;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
});

// Stars background
const stars = Array.from({length: 150}, () => ({
  x: Math.random() * 3000,
  y: Math.random() * 2000,
  r: Math.random() * 1.5,
  b: 0.3 + Math.random() * 0.5
}));

let frame = 0;

function update() {
  frame++;
  const t = Date.now();

  // Spawn particles
  for (let i = 0; i < particleRate; i++) spawnParticle();

  // Cap particles
  while (particles.length > 3000) {
    particles.shift();
  }

  // Physics
  const G = 0.8;
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age++;
    if (p.age > p.maxLife) {
      particles.splice(i, 1);
      continue;
    }
    p.life = 1 - p.age / p.maxLife;

    // Gravity from wells
    let totalForce = 0;
    let dead = false;
    for (const w of wells) {
      const dx = w.x - p.x;
      const dy = w.y - p.y;
      const distSq = dx*dx + dy*dy;
      const dist = Math.sqrt(distSq);

      // Absorbed?
      if (dist < w.radius * 0.4) {
        particles.splice(i, 1);
        absorbed++;
        dead = true;
        break;
      }

      const force = G * w.mass / (distSq + 100); // softened gravity
      totalForce += force;
      p.vx += (dx / dist) * force;
      p.vy += (dy / dist) * force;
    }
    if (dead) continue;

    // Speed limit
    const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (speed > 8) {
      p.vx = (p.vx/speed) * 8;
      p.vy = (p.vy/speed) * 8;
    }

    p.x += p.vx;
    p.y += p.vy;

    // Trail
    if (trails) {
      p.trail.push({x: p.x, y: p.y});
      if (p.trail.length > p.trailMax) p.trail.shift();
    }

    // Remove if way off screen
    if (p.x < -200 || p.x > W+200 || p.y < -200 || p.y > H+200) {
      particles.splice(i, 1);
    }
  }

  // Draw
  if (trails) {
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  // Stars
  for (const s of stars) {
    const twinkle = s.b + Math.sin(t * 0.001 + s.x) * 0.2;
    ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
    ctx.fillRect(s.x % W, s.y % H, s.r, s.r);
  }

  // Draw particles + trails
  for (const p of particles) {
    const v = Math.min(1, Math.sqrt(p.vx*p.vx + p.vy*p.vy) / 5);
    const color = modeColors[mode](t, v, p);

    // Trail
    if (trails && p.trail.length > 1) {
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let j = 1; j < p.trail.length; j++) {
        ctx.lineTo(p.trail[j].x, p.trail[j].y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = p.life * 0.5;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Particle dot
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5 + v, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 4 + v * 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Draw wells
  for (const w of wells) {
    const age = (t - w.born) * 0.001;
    const pulse = 1 + Math.sin(t * 0.003 + w.pulse) * 0.15;
    const r = w.radius * pulse;

    // Event horizon (dark center)
    const grad = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, r * 2.5);
    grad.addColorStop(0, 'rgba(0,0,0,0.9)');
    grad.addColorStop(0.3, 'rgba(0,0,0,0.5)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(w.x, w.y, r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Accretion ring
    const ringColor = wellColors[mode](t);
    ctx.beginPath();
    ctx.arc(w.x, w.y, r * 1.2, 0, Math.PI * 2);
    ctx.strokeStyle = ringColor + (0.3 + pulse * 0.2) + ')';
    ctx.lineWidth = 2;
    ctx.shadowColor = ringColor + '0.8)';
    ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Inner glow
    ctx.beginPath();
    ctx.arc(w.x, w.y, r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = ringColor + '0.6)';
    ctx.shadowColor = ringColor + '1)';
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Mouse preview when holding
  if (mouseDown && mouseStart) {
    const holdTime = Date.now() - mouseStart.time;
    const previewMass = Math.min(500, 50 + holdTime * 0.5);
    const previewR = Math.sqrt(previewMass) * 1.5;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, previewR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Mass label
    ctx.fillStyle = '#0ff';
    ctx.font = '14px VT323';
    ctx.fillText(`mass: ${previewMass.toFixed(0)}`, mouseX + previewR + 8, mouseY);
  }

  // Update stats
  let totalEnergy = 0;
  for (const p of particles) {
    totalEnergy += p.vx*p.vx + p.vy*p.vy;
  }
  document.getElementById('s-wells').textContent = wells.length;
  document.getElementById('s-parts').textContent = particles.length;
  document.getElementById('s-absorbed').textContent = absorbed;
  document.getElementById('s-energy').textContent = totalEnergy.toFixed(0);

  // Fade help after 5 seconds
  if (frame > 300) {
    document.getElementById('help').style.opacity = '0';
  }

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
