<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing Patterns — chaoscat.win</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
canvas { display: block; cursor: crosshair; }
#ui {
  position: fixed; top: 12px; left: 12px; z-index: 10;
  display: flex; flex-direction: column; gap: 6px;
  pointer-events: none;
}
#ui > * { pointer-events: auto; }
#title {
  font-size: 14px; letter-spacing: 2px; opacity: 0.7;
  text-transform: uppercase; margin-bottom: 4px;
}
#subtitle { font-size: 11px; opacity: 0.5; margin-bottom: 8px; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
button {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  color: #fff; padding: 5px 10px; font-family: inherit; font-size: 11px;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.2s;
}
button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
button.active { background: rgba(255,255,255,0.2); border-color: #fff; }
#info {
  position: fixed; bottom: 12px; left: 12px; font-size: 11px;
  opacity: 0.4; z-index: 10;
}
#preset-name {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 28px; letter-spacing: 6px; text-transform: uppercase;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20;
  text-shadow: 0 0 20px currentColor;
}
</style>
</head>
<body>
<div id="ui">
  <div id="title">Turing Patterns</div>
  <div id="subtitle">click to seed · drag to paint · scroll speed</div>
  <div class="btn-row" id="preset-btns"></div>
  <div class="btn-row" id="palette-btns"></div>
  <div class="btn-row">
    <button id="btn-clear">Clear</button>
    <button id="btn-seed">Seed</button>
    <button id="btn-symmetry">Symmetry: Off</button>
  </div>
</div>
<div id="info">iteration: <span id="iter">0</span></div>
<div id="preset-name"></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Simulation at half resolution for performance
let W, H, simW, simH;
let gridA, gridB, nextA, nextB;
let iteration = 0;
let speed = 8; // steps per frame
let symmetry = false;
let painting = false;
let brushSize = 8;

const PRESETS = {
  'Mitosis':   { dA: 1.0, dB: 0.5, feed: 0.0367, kill: 0.0649 },
  'Coral':     { dA: 1.0, dB: 0.5, feed: 0.0545, kill: 0.062 },
  'Maze':      { dA: 1.0, dB: 0.5, feed: 0.029, kill: 0.057 },
  'Spots':     { dA: 1.0, dB: 0.5, feed: 0.035, kill: 0.065 },
  'Worms':     { dA: 1.0, dB: 0.5, feed: 0.078, kill: 0.061 },
  'Bubbles':   { dA: 1.0, dB: 0.5, feed: 0.012, kill: 0.05 },
  'Waves':     { dA: 1.0, dB: 0.5, feed: 0.014, kill: 0.054 },
  'Solitons':  { dA: 1.0, dB: 0.5, feed: 0.03, kill: 0.062 },
};

const PALETTES = {
  'Organic':  (a, b) => {
    const v = b * 2.5;
    return [40 + v * 80, 60 + v * 120, 50 + v * 60];
  },
  'Neon':     (a, b) => {
    const v = b * 3;
    return [v * 255, v * 80, 255 - v * 200];
  },
  'Thermal':  (a, b) => {
    const v = b * 3;
    return [Math.min(255, v * 400), Math.max(0, v * 200 - 50), Math.max(0, v * 50 - 30)];
  },
  'Ocean':    (a, b) => {
    const v = b * 3;
    return [v * 30, v * 130, 80 + v * 175];
  },
  'Bone':     (a, b) => {
    const v = b * 2.5;
    const base = v * 220;
    return [base + 20, base + 10, base];
  },
  'Toxic':    (a, b) => {
    const v = b * 3;
    return [v * 50, 255 * v, v * 30];
  },
};

let currentPreset = 'Mitosis';
let currentPalette = 'Organic';
let params = { ...PRESETS[currentPreset] };

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  simW = Math.floor(W / 2);
  simH = Math.floor(H / 2);
  initGrids();
  seedRandom();
}

function initGrids() {
  const len = simW * simH;
  gridA = new Float32Array(len).fill(1);
  gridB = new Float32Array(len).fill(0);
  nextA = new Float32Array(len);
  nextB = new Float32Array(len);
  iteration = 0;
}

function seedRandom() {
  const cx = simW / 2, cy = simH / 2;
  for (let i = 0; i < 20; i++) {
    const sx = cx + (Math.random() - 0.5) * simW * 0.6;
    const sy = cy + (Math.random() - 0.5) * simH * 0.6;
    seedAt(sx, sy, 4 + Math.random() * 6);
  }
}

function seedAt(x, y, r) {
  const ix = Math.floor(x), iy = Math.floor(y), ir = Math.ceil(r);
  for (let dy = -ir; dy <= ir; dy++) {
    for (let dx = -ir; dx <= ir; dx++) {
      if (dx*dx + dy*dy > r*r) continue;
      let px = ix + dx, py = iy + dy;
      if (px < 0 || px >= simW || py < 0 || py >= simH) continue;
      const idx = py * simW + px;
      gridB[idx] = 1;
      
      if (symmetry) {
        // Mirror across center
        let mx = simW - 1 - px, my = simH - 1 - py;
        if (mx >= 0 && mx < simW && my >= 0 && my < simH) gridB[my * simW + mx] = 1;
        if (mx >= 0 && mx < simW) gridB[py * simW + mx] = 1;
        if (my >= 0 && my < simH) gridB[my * simW + px] = 1;
      }
    }
  }
}

function step() {
  const { dA, dB, feed, kill } = params;
  const w = simW, h = simH;
  
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const i = y * w + x;
      const a = gridA[i], b = gridB[i];
      
      // Laplacian (5-point stencil with diagonals)
      const lapA = 
        gridA[i - 1] * 0.2 + gridA[i + 1] * 0.2 +
        gridA[i - w] * 0.2 + gridA[i + w] * 0.2 +
        gridA[i - w - 1] * 0.05 + gridA[i - w + 1] * 0.05 +
        gridA[i + w - 1] * 0.05 + gridA[i + w + 1] * 0.05 -
        a;
      const lapB = 
        gridB[i - 1] * 0.2 + gridB[i + 1] * 0.2 +
        gridB[i - w] * 0.2 + gridB[i + w] * 0.2 +
        gridB[i - w - 1] * 0.05 + gridB[i - w + 1] * 0.05 +
        gridB[i + w - 1] * 0.05 + gridB[i + w + 1] * 0.05 -
        b;
      
      const abb = a * b * b;
      nextA[i] = a + (dA * lapA - abb + feed * (1 - a));
      nextB[i] = b + (dB * lapB + abb - (kill + feed) * b);
      
      // Clamp
      if (nextA[i] < 0) nextA[i] = 0;
      if (nextA[i] > 1) nextA[i] = 1;
      if (nextB[i] < 0) nextB[i] = 0;
      if (nextB[i] > 1) nextB[i] = 1;
    }
  }
  
  // Swap
  const tmpA = gridA; gridA = nextA; nextA = tmpA;
  const tmpB = gridB; gridB = nextB; nextB = tmpB;
  iteration++;
}

function render() {
  const img = ctx.createImageData(W, H);
  const d = img.data;
  const colorFn = PALETTES[currentPalette];
  
  for (let y = 0; y < H; y++) {
    const sy = Math.floor(y / 2);
    for (let x = 0; x < W; x++) {
      const sx = Math.floor(x / 2);
      const i = sy * simW + sx;
      const pi = (y * W + x) * 4;
      const a = gridA[i], b = gridB[i];
      const [r, g, bl] = colorFn(a, b);
      d[pi] = Math.min(255, Math.max(0, r));
      d[pi+1] = Math.min(255, Math.max(0, g));
      d[pi+2] = Math.min(255, Math.max(0, bl));
      d[pi+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function loop() {
  for (let i = 0; i < speed; i++) step();
  render();
  document.getElementById('iter').textContent = iteration;
  requestAnimationFrame(loop);
}

// --- UI ---
const presetBtns = document.getElementById('preset-btns');
Object.keys(PRESETS).forEach(name => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.onclick = () => {
    currentPreset = name;
    params = { ...PRESETS[name] };
    initGrids();
    seedRandom();
    updateBtns();
    flashName(name);
  };
  presetBtns.appendChild(btn);
});

const paletteBtns = document.getElementById('palette-btns');
Object.keys(PALETTES).forEach(name => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.onclick = () => { currentPalette = name; updateBtns(); };
  paletteBtns.appendChild(btn);
});

function updateBtns() {
  presetBtns.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.textContent === currentPreset));
  paletteBtns.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.textContent === currentPalette));
}

function flashName(name) {
  const el = document.getElementById('preset-name');
  el.textContent = name;
  el.style.opacity = 1;
  setTimeout(() => el.style.opacity = 0, 1200);
}

document.getElementById('btn-clear').onclick = () => { initGrids(); };
document.getElementById('btn-seed').onclick = () => { seedRandom(); };
document.getElementById('btn-symmetry').onclick = function() {
  symmetry = !symmetry;
  this.textContent = 'Symmetry: ' + (symmetry ? 'On' : 'Off');
};

// Mouse interaction
canvas.addEventListener('mousedown', e => { painting = true; paint(e); });
canvas.addEventListener('mousemove', e => { if (painting) paint(e); });
canvas.addEventListener('mouseup', () => painting = false);
canvas.addEventListener('mouseleave', () => painting = false);

canvas.addEventListener('touchstart', e => { e.preventDefault(); painting = true; paintTouch(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (painting) paintTouch(e); });
canvas.addEventListener('touchend', () => painting = false);

function paint(e) {
  const sx = e.clientX / 2, sy = e.clientY / 2;
  seedAt(sx, sy, brushSize);
}
function paintTouch(e) {
  const t = e.touches[0];
  const sx = t.clientX / 2, sy = t.clientY / 2;
  seedAt(sx, sy, brushSize);
}

// Scroll for speed
window.addEventListener('wheel', e => {
  speed = Math.max(1, Math.min(32, speed + (e.deltaY > 0 ? -2 : 2)));
}, { passive: true });

window.addEventListener('resize', resize);
resize();
updateBtns();
loop();
</script>
</body>
</html>
