<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>π Walk — chaoscat.win</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #08080e;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  height: 100vh;
}
canvas { display: block; width: 100%; height: 100%; cursor: grab; }
canvas:active { cursor: grabbing; }
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  background: rgba(8,8,14,0.9);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 10; flex-wrap: wrap; gap: 6px;
}
.title { font-size: 18px; letter-spacing: 2px; white-space: nowrap; }
.title .pi { color: #ff6b9d; font-size: 22px; }
.title .sub { color: rgba(255,255,255,0.4); font-size: 11px; margin-left: 8px; }
#controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  color: #ccc; padding: 5px 12px;
  font-family: inherit; font-size: 11px;
  cursor: pointer; letter-spacing: 1px;
  transition: all 0.15s; border-radius: 2px;
}
button:hover { background: rgba(255,255,255,0.12); color: #fff; }
#info {
  position: fixed; bottom: 10px; left: 16px;
  font-size: 12px; color: rgba(255,255,255,0.4);
  z-index: 10; line-height: 1.6;
}
#digits-trail {
  position: fixed; bottom: 10px; right: 16px;
  font-size: 36px; font-weight: bold;
  color: rgba(255,255,255,0.06);
  z-index: 10; letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}
#legend {
  position: fixed; top: 50px; right: 12px;
  display: flex; flex-direction: column; gap: 1px;
  font-size: 10px; color: rgba(255,255,255,0.35);
  z-index: 10;
}
.lr { display: flex; align-items: center; gap: 5px; }
.ls { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
#pi-day {
  position: fixed; top: 50px; left: 16px;
  font-size: 11px; color: rgba(255,107,157,0.5);
  z-index: 10;
}
</style>
</head>
<body>
<div id="hud">
  <div class="title"><span class="pi">π</span> WALK <span class="sub">happy pi day 2026</span></div>
  <div id="controls">
    <button id="btn-mode">SPECTRUM</button>
    <button id="btn-speed">▶</button>
    <button id="btn-style">LINE</button>
    <button id="btn-follow">FOLLOW: ON</button>
    <button id="btn-reset">RESET</button>
  </div>
</div>
<div id="pi-day">3.14 — each digit turns the walker 36° × digit</div>
<canvas id="c"></canvas>
<div id="info">
  <div>digits: <span id="n">0</span> / 10,000</div>
  <div>drag to pan · scroll to zoom</div>
</div>
<div id="digits-trail"></div>
<div id="legend"></div>

<script>
const PI = "1415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491298336733624406566430860213949463952247371907021798609437027705392171762931767523846748184676694051320005681271452635608277857713427577896091736371787214684409012249534301465495853710507922796892589235420199561121290219608640344181598136297747713099605187072113499999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577805321712268066130019278766111959092164201989380952572010654858632788659361533818279682303019520353018529689957736225994138912497217752834791315155748572424541506959508295331168617278558890750983817546374649393192550604009277016711390098488240128583616035637076601047101819429555961989467678374494482553797747268471040475346462080466842590694912933136770289891521047521620569660240580381501935112533824300355876402474964732639141992726042699227967823547816360093417216412199245863150302861829745557067498385054945885869269956909272107975093029553211653449872027559602364806654991198818347977535663698074265425278625518184175746728909777727938000816470600161452491921732172147723501414419735685481613611573525521334757418494684385233239073941433345477624168625189835694855620992192221842725502542568876717904946016534668049886272327917860857843838279679766814541009538837863609506800642251252051173929848960841284886269456042419652850222106611863067442786220391949450471237137869609563643719172874677646575739624138908658326459958133904780275900994657640789512694683983525957098258226205224894077267194782684826014769909026401363944374553050682034962524517493996514314298091906592509372216964615157098583874105978859597729754989301617539284681382686838689427741559918559252459539594310499725246808459872736446958486538367362226260991246080512438843904512441365497627807977156914359977001296160894416948685558484063534220722258284886481584560285060168427394522674676770981190399201989152104752162056966024058038150193511253382430035587640247496473263914199272604269922796782354781636009341721641219924586315030286182974555706749838505494588586926995690927210797509302955321165344987202755960236480665499119881834797753566369807426542527862551818417574672890977772793800081647060016145249192173217214772350141441973568548161361157352552133475741849468438523323907394143334547762416862518983569485562099219222184272550254256887671790494601653466804988627232791786085784383827967976681454100953883786360950680064225125205117392984896084128488626945604241965285022210661186306744278622039194945047123713786960956364371917287467764657573962413890865832645995813390478027590099465764078951269468398352595709825822620522489407726719478268482601476990902640136394437455305068203496252451749399651431429809190659250937221696461515709858387410597885959772975498930161753928468138268683868942774155991855925245953959431049972524680845987273644695848653836736222626099124608051243884390451244136549762780797715691435997700129616089441694868555848406353422072225828488648158456028506016842739452267467678895252138522549954666727823986456596116354886230577456498035593634568174324112515076069479451096596094025228879710893145669136867228748940560101503308617928680920874760917824938589009714909675985261365549781893129784821682998948722658804857564014270477555132379641451523746234364542858444795265867821051141354735739523113427166102135969536231442952484937187110145765403590279934403742007310578539062198387447808478489683321445713868751943506430218453191048481005370614680674919278191197939952061419663428754440643745123718192179998391015919561814675142691239748940907186494231961567945208095146550225231603881930142093762137855956638937787083039069792077346722182562599661501421503068038447734549202605414665925201497442850732518666002132434088190710486331734649651453905796268561005508106658796998163574736384052571459102897064140110971206280439039759515677157700420337869936007230558763176359421873125147120532928191826186125867321579198414848829164470609575270695722091756711672291098169091528017350671274858322287183520935396572512108357915136988209144421006751033467110314126711136990865851639831501970165151168517143765761835155650884909989859982387345528331635507647918535893226185489632132933089857064204675259070915481416549859461637180270981994309924488957571282890592323326097299712084433573265489382391193259746366730583604142813883032038249037589852437441702913276561809377344403070746921120191302033038019762110110044929321516084244485963766983895228684783123552658213144957685726243344189303968642624341077322697802807318915441101044682325271620105265227211166039666557309254711055785376346682065310989652691862056476931257058635662018558100729360659876486117910453348850346113657686753249441668039626579787718556084552965412665408530614344431858676975145661406800700237877659134401712749470420562230538994561314071127000407854733269939081454664645880797270826683063432858785698305235808933065757406795457163775254202114955761581400250126228594130216471550979259230990796547376125517656751357517829666454779174501129961489030463994713296210734043751895735961458901938971311179042978285647503203198691514028708085990480109412147221317947647772622414254854540332157185306142288137585043063321751829798662237172159160771669254748738986654949450114654062843366393833952942578690507643100638351983438934159613185434754649556978103829309716465143840700707360411237359984345225161050702705623526601276484830840761183013052793205427462865403603674532865105706587488225698157936789766974220575059683440869735020141020672358502007245225632651341055924019027421624843914035998953539459094407046912091409387001264560016237428802109276457931065792295524988727584610126483699989225695968815920560010165525637567";

const D = PI.split('').map(Number);
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  needsRedraw = true;
}
resize();
window.addEventListener('resize', resize);

// Modes
const MODES = ['SPECTRUM','FIRE','ICE','MONO','NEON','PASTEL'];
let modeIdx = 0;
const STYLES = ['LINE','DOT','GLOW'];
let styleIdx = 0;
const SPEEDS = [1,5,25,100];
const SLABELS = ['▶','▶▶','▶▶▶','MAX'];
let speedIdx = 0;
let follow = true;

// Walk state
let step = 0, wx = 0, wy = 0, ang = 0;
let segs = []; // stored as flat: [x1,y1,x2,y2,digit,idx]
let needsRedraw = true;

// View
let vx = 0, vy = 0, zm = 1;
let drag = false, dx0, dy0, vx0, vy0;

function dColor(d) {
  switch(MODES[modeIdx]) {
    case 'SPECTRUM': return `hsl(${d*36},85%,58%)`;
    case 'FIRE': return `hsl(${[0,10,20,30,45,40,25,15,5,35][d]},100%,${48+d*2}%)`;
    case 'ICE': return `hsl(${185+d*10},75%,${50+d*3}%)`;
    case 'MONO': { const b=40+d*6; return `rgb(${b},${b},${b+15})`; }
    case 'NEON': return `hsl(${[320,280,200,160,120,80,40,0,300,240][d]},100%,62%)`;
    case 'PASTEL': return `hsl(${d*36},60%,75%)`;
  }
}

function w2s(x,y) {
  return [(x-vx)*zm+W/2, (y-vy)*zm+H/2];
}

function advance() {
  if (step >= D.length) return false;
  const d = D[step];
  ang += d * (Math.PI*2/10);
  const nx = wx + Math.cos(ang)*5;
  const ny = wy + Math.sin(ang)*5;
  segs.push(wx, wy, nx, ny, d, step);
  wx = nx; wy = ny;
  step++;
  return true;
}

function draw() {
  ctx.fillStyle = '#08080e';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  const gs = 100*zm;
  if (gs > 8) {
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    const ox = (-vx*zm+W/2)%gs;
    const oy = (-vy*zm+H/2)%gs;
    ctx.beginPath();
    for (let x=ox%gs; x<W; x+=gs) { ctx.moveTo(x,0); ctx.lineTo(x,H); }
    for (let y=oy%gs; y<H; y+=gs) { ctx.moveTo(0,y); ctx.lineTo(W,y); }
    ctx.stroke();
  }

  const style = STYLES[styleIdx];
  const n = segs.length/6;

  // Glow pass
  if (style === 'GLOW') {
    ctx.globalAlpha = 0.12;
    ctx.lineWidth = Math.max(1, 4*zm);
    for (let i=0; i<segs.length; i+=6) {
      const [sx,sy] = w2s(segs[i],segs[i+1]);
      const [ex,ey] = w2s(segs[i+2],segs[i+3]);
      if (sx<-30&&ex<-30||sx>W+30&&ex>W+30||sy<-30&&ey<-30||sy>H+30&&ey>H+30) continue;
      ctx.strokeStyle = dColor(segs[i+4]);
      ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Main pass
  const lw = Math.max(0.4, (style==='GLOW'?1.2:1.5)*zm);
  ctx.lineWidth = lw;

  // Batch by digit for fewer style changes
  if (style === 'DOT') {
    for (let d=0; d<10; d++) {
      ctx.fillStyle = dColor(d);
      ctx.beginPath();
      const r = Math.max(1, 2*zm);
      for (let i=0; i<segs.length; i+=6) {
        if (segs[i+4] !== d) continue;
        const [ex,ey] = w2s(segs[i+2],segs[i+3]);
        if (ex<-10||ex>W+10||ey<-10||ey>H+10) continue;
        ctx.moveTo(ex+r,ey);
        ctx.arc(ex,ey,r,0,Math.PI*2);
      }
      ctx.fill();
    }
  } else {
    for (let d=0; d<10; d++) {
      ctx.strokeStyle = dColor(d);
      ctx.beginPath();
      for (let i=0; i<segs.length; i+=6) {
        if (segs[i+4] !== d) continue;
        const [sx,sy] = w2s(segs[i],segs[i+1]);
        const [ex,ey] = w2s(segs[i+2],segs[i+3]);
        if (Math.max(sx,ex)<-20||Math.min(sx,ex)>W+20||Math.max(sy,ey)<-20||Math.min(sy,ey)>H+20) continue;
        ctx.moveTo(sx,sy);
        ctx.lineTo(ex,ey);
      }
      ctx.stroke();
    }
  }

  // Origin
  const [ox,oy] = w2s(0,0);
  ctx.strokeStyle = 'rgba(255,107,157,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(ox,oy,5,0,Math.PI*2); ctx.stroke();

  // Head
  if (step > 0) {
    const [hx,hy] = w2s(wx,wy);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.arc(hx,hy,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function updateUI() {
  document.getElementById('n').textContent = step.toLocaleString();
  if (step > 0) {
    const last = D.slice(Math.max(0,step-8),step);
    document.getElementById('digits-trail').textContent = last.join('');
  }
}

function updateLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = Array.from({length:10}, (_,d) =>
    `<div class="lr"><div class="ls" style="background:${dColor(d)}"></div>${d}→${d*36}°</div>`
  ).join('');
}

function reset() {
  step=0; wx=0; wy=0; ang=0; segs=[]; vx=0; vy=0; zm=1;
  needsRedraw=true; updateUI();
}

// Pan
canvas.addEventListener('mousedown', e => { drag=true; dx0=e.clientX; dy0=e.clientY; vx0=vx; vy0=vy; });
canvas.addEventListener('mousemove', e => { if(!drag) return; vx=vx0-(e.clientX-dx0)/zm; vy=vy0-(e.clientY-dy0)/zm; needsRedraw=true; });
canvas.addEventListener('mouseup', () => drag=false);
canvas.addEventListener('mouseleave', () => drag=false);
canvas.addEventListener('wheel', e => { e.preventDefault(); zm *= e.deltaY>0?0.9:1.1; zm=Math.max(0.005,Math.min(80,zm)); needsRedraw=true; }, {passive:false});

// Touch
let td=0;
canvas.addEventListener('touchstart', e => { e.preventDefault(); if(e.touches.length===1){drag=true;dx0=e.touches[0].clientX;dy0=e.touches[0].clientY;vx0=vx;vy0=vy;}else if(e.touches.length===2){const a=e.touches[0],b=e.touches[1];td=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}},{passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(e.touches.length===1&&drag){vx=vx0-(e.touches[0].clientX-dx0)/zm;vy=vy0-(e.touches[0].clientY-dy0)/zm;needsRedraw=true;}else if(e.touches.length===2){const a=e.touches[0],b=e.touches[1];const nd=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);if(td>0){zm*=nd/td;zm=Math.max(0.005,Math.min(80,zm));needsRedraw=true;}td=nd;}},{passive:false});
canvas.addEventListener('touchend', () => { drag=false; td=0; });

// Buttons
document.getElementById('btn-mode').onclick = () => { modeIdx=(modeIdx+1)%MODES.length; document.getElementById('btn-mode').textContent=MODES[modeIdx]; updateLegend(); needsRedraw=true; };
document.getElementById('btn-speed').onclick = () => { speedIdx=(speedIdx+1)%SPEEDS.length; document.getElementById('btn-speed').textContent=SLABELS[speedIdx]; };
document.getElementById('btn-style').onclick = () => { styleIdx=(styleIdx+1)%STYLES.length; document.getElementById('btn-style').textContent=STYLES[styleIdx]; needsRedraw=true; };
document.getElementById('btn-follow').onclick = () => { follow=!follow; document.getElementById('btn-follow').textContent='FOLLOW: '+(follow?'ON':'OFF'); };
document.getElementById('btn-reset').onclick = reset;

// Main loop
function loop() {
  const sp = SPEEDS[speedIdx];
  let adv = false;
  for (let i=0; i<sp; i++) { if(advance()) adv=true; else break; }
  if (follow && !drag && step < D.length && step > 10) {
    vx += (wx-vx)*0.03;
    vy += (wy-vy)*0.03;
    adv = true;
  }
  if (adv) { needsRedraw=true; updateUI(); }
  if (needsRedraw) { draw(); needsRedraw=false; }
  requestAnimationFrame(loop);
}

updateLegend();
reset();
loop();
</script>
</body>
</html>
