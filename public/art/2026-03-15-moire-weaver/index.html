<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moiré Weaver — chaoscat.win</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  cursor: crosshair;
  user-select: none;
}
canvas { display: block; }
#ui {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 10;
  flex-wrap: wrap;
  justify-content: center;
}
button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  padding: 8px 16px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); }
button.active { background: rgba(255,255,255,0.2); border-color: #fff; }
#info {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  text-align: center;
  z-index: 10;
  pointer-events: none;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}
#title {
  font-size: 22px;
  color: rgba(255,255,255,0.8);
  margin-bottom: 4px;
  letter-spacing: 3px;
}
#subtitle { font-size: 12px; opacity: 0.5; }
#layers-info {
  position: fixed;
  top: 20px;
  right: 20px;
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  z-index: 10;
  pointer-events: none;
  text-align: right;
  line-height: 1.6;
}
</style>
</head>
<body>
<div id="info">
  <div id="title">MOIRÉ WEAVER</div>
  <div id="subtitle">move mouse to shift · scroll to scale · click to add layer</div>
</div>
<div id="layers-info"></div>
<canvas id="c"></canvas>
<div id="ui">
  <button onclick="setPattern('lines')" id="btn-lines" class="active">Lines</button>
  <button onclick="setPattern('circles')" id="btn-circles">Circles</button>
  <button onclick="setPattern('dots')" id="btn-dots">Dots</button>
  <button onclick="setPattern('hex')" id="btn-hex">Hex</button>
  <button onclick="setPattern('waves')" id="btn-waves">Waves</button>
  <button onclick="setPattern('spiral')" id="btn-spiral">Spiral</button>
  <button onclick="cycleColor()" id="btn-color">Color: Mono</button>
  <button onclick="toggleAuto()" id="btn-auto">Auto: Off</button>
  <button onclick="resetLayers()">Reset</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const layersInfo = document.getElementById('layers-info');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

let mx = 0, my = 0;
let mouseActive = false;
let scale = 1.0;
let pattern = 'lines';
let colorMode = 0;
const colorModes = ['Mono', 'Spectrum', 'Neon', 'Ember', 'Ice'];
let autoMode = false;
let time = 0;

// Each layer: { pattern, angle, spacing, offsetX, offsetY, color }
let layers = [];

function createLayer(p, angle) {
  const colors = ['rgba(255,255,255,0.5)', 'rgba(200,220,255,0.5)', 'rgba(255,200,200,0.5)'];
  return {
    pattern: p || pattern,
    angle: angle !== undefined ? angle : (Math.random() * Math.PI),
    spacing: 8 + Math.random() * 8,
    offsetX: 0,
    offsetY: 0,
    color: colors[layers.length % colors.length],
    birth: Date.now()
  };
}

// Start with 2 layers
layers.push(createLayer('lines', 0));
layers.push(createLayer('lines', Math.PI / 6));

document.addEventListener('mousemove', e => {
  mx = (e.clientX - cx) / cx; // -1 to 1
  my = (e.clientY - cy) / cy;
  mouseActive = true;
});

document.addEventListener('wheel', e => {
  scale *= e.deltaY > 0 ? 0.95 : 1.05;
  scale = Math.max(0.3, Math.min(3.0, scale));
});

canvas.addEventListener('click', e => {
  if (layers.length < 6) {
    layers.push(createLayer(pattern));
  }
});

function setPattern(p) {
  pattern = p;
  document.querySelectorAll('#ui button').forEach(b => {
    if (b.id.startsWith('btn-') && b.id !== 'btn-color' && b.id !== 'btn-auto') {
      b.classList.toggle('active', b.id === 'btn-' + p);
    }
  });
}

function cycleColor() {
  colorMode = (colorMode + 1) % colorModes.length;
  document.getElementById('btn-color').textContent = 'Color: ' + colorModes[colorMode];
}

function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('btn-auto').textContent = 'Auto: ' + (autoMode ? 'On' : 'Off');
  document.getElementById('btn-auto').classList.toggle('active', autoMode);
}

function resetLayers() {
  layers = [];
  layers.push(createLayer('lines', 0));
  layers.push(createLayer('lines', Math.PI / 6));
}

function getColor(layerIdx, alpha) {
  const a = alpha || 0.5;
  switch (colorMode) {
    case 0: return `rgba(255,255,255,${a})`;
    case 1: { // Spectrum
      const hue = (layerIdx * 60 + time * 20) % 360;
      return `hsla(${hue},80%,60%,${a})`;
    }
    case 2: { // Neon
      const neons = ['#0ff', '#f0f', '#0f0', '#ff0', '#f00', '#00f'];
      const c = neons[layerIdx % neons.length];
      return c + Math.round(a * 255).toString(16).padStart(2, '0');
    }
    case 3: { // Ember
      const hue = (layerIdx * 30 + 10) % 60;
      return `hsla(${hue},100%,50%,${a})`;
    }
    case 4: { // Ice
      const hue = 180 + (layerIdx * 20);
      return `hsla(${hue},70%,65%,${a})`;
    }
  }
}

function drawLayer(layer, idx) {
  ctx.save();
  ctx.translate(cx, cy);

  let angleOffset = 0;
  let posOffset = 0;
  if (autoMode) {
    angleOffset = Math.sin(time * 0.3 + idx * 1.7) * 0.3;
    posOffset = Math.sin(time * 0.5 + idx * 2.3) * 50;
  }

  const mouseAngle = mx * 0.5 * (idx + 1) * 0.3;
  const mouseShift = my * 30 * (idx + 1) * 0.3;

  const angle = layer.angle + mouseAngle + angleOffset;
  const spacing = layer.spacing * scale;
  const shift = mouseShift + posOffset;

  ctx.rotate(angle);
  ctx.translate(shift, shift * 0.5);

  const color = getColor(idx, 0.45);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 1;

  const maxDim = Math.max(W, H) * 1.5;

  switch (layer.pattern) {
    case 'lines':
      drawLines(spacing, maxDim);
      break;
    case 'circles':
      drawCircles(spacing, maxDim);
      break;
    case 'dots':
      drawDots(spacing, maxDim);
      break;
    case 'hex':
      drawHex(spacing, maxDim);
      break;
    case 'waves':
      drawWaves(spacing, maxDim, idx);
      break;
    case 'spiral':
      drawSpiral(spacing, idx);
      break;
  }

  ctx.restore();
}

function drawLines(spacing, maxDim) {
  const count = Math.ceil(maxDim / spacing);
  ctx.beginPath();
  for (let i = -count; i <= count; i++) {
    const x = i * spacing;
    ctx.moveTo(x, -maxDim);
    ctx.lineTo(x, maxDim);
  }
  ctx.stroke();
}

function drawCircles(spacing, maxDim) {
  const count = Math.ceil(maxDim / spacing);
  for (let i = 1; i <= count; i++) {
    ctx.beginPath();
    ctx.arc(0, 0, i * spacing, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawDots(spacing, maxDim) {
  const count = Math.ceil(maxDim / spacing);
  const r = Math.max(1, spacing * 0.15);
  for (let y = -count; y <= count; y++) {
    for (let x = -count; x <= count; x++) {
      ctx.beginPath();
      ctx.arc(x * spacing, y * spacing, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawHex(spacing, maxDim) {
  const count = Math.ceil(maxDim / spacing);
  const s = spacing * 0.4;
  for (let row = -count; row <= count; row++) {
    for (let col = -count; col <= count; col++) {
      const x = col * spacing * 1.5;
      const y = row * spacing * Math.sqrt(3) + (col % 2 ? spacing * Math.sqrt(3) / 2 : 0);
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i - Math.PI / 6;
        const px = x + Math.cos(a) * s;
        const py = y + Math.sin(a) * s;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
}

function drawWaves(spacing, maxDim, idx) {
  const count = Math.ceil(maxDim / spacing);
  const amp = spacing * 1.5;
  const freq = 0.02 / scale;
  for (let i = -count; i <= count; i++) {
    ctx.beginPath();
    for (let x = -maxDim; x <= maxDim; x += 4) {
      const y = i * spacing + Math.sin(x * freq + time * 2 + idx) * amp;
      x === -maxDim ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function drawSpiral(spacing, idx) {
  const maxR = Math.max(W, H);
  const turns = maxR / (spacing * 2);
  ctx.beginPath();
  for (let a = 0; a < turns * Math.PI * 2; a += 0.05) {
    const r = a * spacing / (Math.PI * 2) * 2;
    const x = Math.cos(a + time * 0.5 + idx) * r;
    const y = Math.sin(a + time * 0.5 + idx) * r;
    a === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function updateLayersInfo() {
  let html = `LAYERS: ${layers.length}/6<br>`;
  html += `SCALE: ${scale.toFixed(2)}×<br>`;
  html += `PATTERN: ${pattern.toUpperCase()}`;
  layersInfo.innerHTML = html;
}

function frame() {
  time += 0.016;

  // Fade trail for ghostly persistence
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < layers.length; i++) {
    drawLayer(layers[i], i);
  }

  ctx.globalCompositeOperation = 'source-over';

  updateLayersInfo();
  requestAnimationFrame(frame);
}

frame();

// Touch support
document.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mx = (t.clientX - cx) / cx;
  my = (t.clientY - cy) / cy;
}, { passive: false });

document.addEventListener('touchstart', e => {
  if (layers.length < 6) {
    layers.push(createLayer(pattern));
  }
});
</script>
</body>
</html>
