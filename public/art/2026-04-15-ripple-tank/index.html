<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripple Tank — chaoscat.win</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'VT323',monospace;color:#aaa;width:100vw;height:100vh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
canvas{display:block;flex:1;cursor:crosshair}
#ui{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:8px 14px;background:rgba(10,10,15,.85);font-size:16px;flex-wrap:wrap;z-index:10}
#ui button{font-family:'VT323',monospace;font-size:15px;background:none;border:1px solid #555;color:#aaa;padding:2px 10px;cursor:pointer;border-radius:2px}
#ui button:hover,#ui button.active{border-color:#fff;color:#fff}
#ui label{display:flex;align-items:center;gap:4px;font-size:14px}
#ui input[type=range]{width:70px;accent-color:#888}
#stats{position:absolute;top:0;right:14px;padding:8px;font-size:14px;color:#666;text-align:right;z-index:10;pointer-events:none;background:rgba(10,10,15,.85)}
#ambient{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:18px;color:rgba(180,180,200,.45);z-index:10;pointer-events:none;transition:opacity 1.5s}
#vignette{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.6) 100%);z-index:5}
</style>
</head>
<body>
<div id="vignette"></div>
<div id="ui">
  <button id="btnSource" class="active" onclick="setTool(0)">① Source</button>
  <button id="btnWall" onclick="setTool(1)">② Wall</button>
  <button id="btnPulse" onclick="setTool(2)">③ Pulse</button>
  <span style="color:#555">|</span>
  <button onclick="doubleSlit()">Double Slit [D]</button>
  <button id="btnPause" onclick="togglePause()">⏸ [Space]</button>
  <button onclick="clearAll()">Clear [C]</button>
  <label>Damp <input type="range" id="sliderDamp" min="0" max="100" value="20"></label>
  <label>Freq <input type="range" id="sliderFreq" min="10" max="100" value="40"></label>
  <button onclick="cyclePalette()">Palette [P]</button>
</div>
<div id="stats"></div>
<div id="ambient"></div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),ambientEl=document.getElementById('ambient'),statsEl=document.getElementById('stats');
const PALETTES={
OCEAN:{name:'OCEAN',map:(v)=>{const t=v*.5+.5;return[Math.floor(10+t*180),Math.floor(30+t*200),Math.floor(80+t*175)]}},
NEON:{name:'NEON',map:(v)=>{if(v>0)return[Math.floor(v*60),Math.floor(v*255),Math.floor(v*220)];const a=-v;return[Math.floor(a*255),Math.floor(a*40),Math.floor(a*200)]}},
THERMAL:{name:'THERMAL',map:(v)=>{if(v>0)return[Math.floor(v*255),Math.floor(v*200*v),Math.floor(v*50*v)];const a=-v;return[Math.floor(a*30),Math.floor(a*100),Math.floor(a*255)]}},
MONO:{name:'MONO',map:(v)=>{const c=Math.floor((v*.5+.5)*255);return[c,c,c]}},
VOID:{name:'VOID',map:(v)=>{const t=v*.5+.5;return[Math.floor(40+t*200),Math.floor(10+t*140),Math.floor(80+t*175)]}}
};
const palKeys=Object.keys(PALETTES);
let palIdx=0,pal=PALETTES[palKeys[0]];

let W,H,curr,prev,walls,sources=[],paused=false,time=0,tool=0;
const c2=.24; // wave speed squared (keep <0.5 for stability)

function resize(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  W=Math.floor(canvas.width/2);H=Math.floor(canvas.height/2);
  curr=new Float32Array(W*H);prev=new Float32Array(W*H);walls=new Uint8Array(W*H);
  sources=[];time=0;
}
window.addEventListener('resize',resize);resize();

function idx(x,y){return y*W+x}

function step(){
  const next=new Float32Array(W*H);
  const damp=1-(document.getElementById('sliderDamp').value/100)*.04;
  for(let y=1;y<H-1;y++){
    for(let x=1;x<W-1;x++){
      const i=idx(x,y);
      if(walls[i])continue;
      next[i]=(2*curr[i]-prev[i]+c2*(curr[i-1]+curr[i+1]+curr[i-W]+curr[i+W]-4*curr[i]))*damp;
    }
  }
  // absorbing boundaries
  for(let x=0;x<W;x++){next[idx(x,0)]=0;next[idx(x,H-1)]=0;}
  for(let y=0;y<H;y++){next[idx(0,y)]=0;next[idx(W-1,y)]=0;}
  // sources
  const baseFreq=document.getElementById('sliderFreq').value/1000;
  for(const s of sources){
    if(s.type==='cont'){
      const v=3*Math.sin(s.freq*time);
      next[idx(s.x,s.y)]=v;
    }
  }
  prev=curr;curr=next;time++;
}

function render(){
  const img=ctx.createImageData(W,H);
  const d=img.data;
  for(let i=0,p=0;i<W*H;i++,p+=4){
    if(walls[i]){d[p]=40;d[p+1]=40;d[p+2]=50;d[p+3]=255;continue;}
    const v=Math.max(-1,Math.min(1,curr[i]/3));
    const[r,g,b]=pal.map(v);
    d[p]=r;d[p+1]=g;d[p+2]=b;d[p+3]=255;
  }
  ctx.putImageData(img,0,0);
  ctx.drawImage(canvas,0,0,W,H,0,0,canvas.width,canvas.height);
}

function loop(){
  if(!paused){for(let i=0;i<3;i++)step();}
  render();
  statsEl.textContent=`${pal.name} | sources: ${sources.length} | ${['SOURCE','WALL','PULSE'][tool]}`;
  requestAnimationFrame(loop);
}

// tools
function setTool(t){tool=t;document.querySelectorAll('#ui button').forEach(b=>b.classList.remove('active'));
['btnSource','btnWall','btnPulse'][t]&&document.getElementById(['btnSource','btnWall','btnPulse'][t]).classList.add('active');}

function toGrid(ex,ey){return[Math.floor(ex/canvas.width*W),Math.floor(ey/canvas.height*H)];}

let drawing=false;
canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const[gx,gy]=toGrid(e.clientX,e.clientY);
  if(tool===1){drawing=true;placeWall(gx,gy);return;}
  if(tool===2||e.shiftKey||e.button===2){placePulse(gx,gy);return;}
  if(sources.length<10){
    const baseFreq=document.getElementById('sliderFreq').value/1000;
    const freq=baseFreq*(1+sources.length*.07);
    sources.push({x:gx,y:gy,freq,type:'cont'});
  }
});
canvas.addEventListener('pointermove',e=>{if(drawing){const[gx,gy]=toGrid(e.clientX,e.clientY);placeWall(gx,gy);}});
canvas.addEventListener('pointerup',()=>{drawing=false;});
canvas.addEventListener('contextmenu',e=>{e.preventDefault();const[gx,gy]=toGrid(e.clientX,e.clientY);placePulse(gx,gy);});

function placeWall(gx,gy){for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const x=gx+dx,y=gy+dy;if(x>0&&x<W-1&&y>0&&y<H-1)walls[idx(x,y)]=1;}}
function placePulse(gx,gy){if(gx>0&&gx<W-1&&gy>0&&gy<H-1)curr[idx(gx,gy)]=8;}

function togglePause(){paused=!paused;document.getElementById('btnPause').textContent=paused?'▶ [Space]':'⏸ [Space]';}
function clearAll(){curr.fill(0);prev.fill(0);walls.fill(0);sources=[];time=0;}
function cyclePalette(){palIdx=(palIdx+1)%palKeys.length;pal=PALETTES[palKeys[palIdx]];}
function doubleSlit(){
  clearAll();
  const wallX=Math.floor(W*.4);
  const slitW=4,slitGap=Math.floor(H*.15),mid=Math.floor(H/2);
  for(let y=0;y<H;y++){
    const dy=y-mid;
    if(Math.abs(dy-slitGap/2)>slitW&&Math.abs(dy+slitGap/2)>slitW){
      for(let dx=-1;dx<=1;dx++)if(wallX+dx>0&&wallX+dx<W-1)walls[idx(wallX+dx,y)]=1;
    }
  }
  const baseFreq=document.getElementById('sliderFreq').value/1000;
  sources.push({x:Math.floor(W*.15),y:mid,freq:baseFreq,type:'cont'});
}

document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k===' '){e.preventDefault();togglePause();}
  else if(k==='p')cyclePalette();
  else if(k==='c')clearAll();
  else if(k==='d')doubleSlit();
  else if(k==='1')setTool(0);
  else if(k==='2')setTool(1);
  else if(k==='3')setTool(2);
});

// ambient text
const phrases=["every point on a wavefront is itself a source of waves","where crests meet crests, the world gets louder","where crests meet troughs, silence","the double slit proved light is a wave. then it proved reality is stranger than waves.","ripples don't know about each other. interference is just math.","drop a stone. the pond remembers.","all of quantum mechanics in a bathtub","huygens was right. every point radiates.","the wave doesn't travel. the medium oscillates.","two sources, one frequency, infinite patterns"];
let phraseIdx=0;
function rotatePhrase(){ambientEl.style.opacity=0;setTimeout(()=>{phraseIdx=(phraseIdx+1)%phrases.length;ambientEl.textContent=phrases[phraseIdx];ambientEl.style.opacity=1;},1500);}
ambientEl.textContent=phrases[0];setInterval(rotatePhrase,8000);

// long press for wall on touch
let longTimer=null;
canvas.addEventListener('touchstart',e=>{
  longTimer=setTimeout(()=>{setTool(1);drawing=true;},500);
},{passive:true});
canvas.addEventListener('touchend',()=>{clearTimeout(longTimer);drawing=false;},{passive:true});
canvas.addEventListener('touchmove',()=>{clearTimeout(longTimer);},{passive:true});

loop();
</script>
</body>
</html>
