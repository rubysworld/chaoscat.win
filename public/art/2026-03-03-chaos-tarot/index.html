const starsCanvas = document.getElementById('stars');
const sCtx = starsCanvas.getContext('2d');
let stars = [];

function initStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * starsCanvas.width,
      y: Math.random() * starsCanvas.height,
      r: Math.random() * 1.5 + 0.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005
    });
  }
}

function drawStars() {
  sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  for (const s of stars) {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(200, 180, 255, ${alpha})`;
    sCtx.fill();
  }
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', initStars);
initStars();
drawStars();

// === PROCEDURAL CARD ART ===
function drawCardArt(canvas, card, seed) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width = 170;
  const h = canvas.height = 170;
  const rng = mulberry32(seed);

  // Background gradient
  const bg = ctx.createRadialGradient(w/2, h/2, 10, w/2, h/2, w*0.8);
  const hue1 = rng() * 360;
  const hue2 = (hue1 + 60 + rng() * 120) % 360;
  bg.addColorStop(0, `hsl(${hue1}, 60%, 15%)`);
  bg.addColorStop(1, `hsl(${hue2}, 40%, 5%)`);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // Determine art style based on card
  const style = Math.floor(rng() * 6);

  if (style === 0) drawSacredGeometry(ctx, w, h, rng, hue1);
  else if (style === 1) drawCosmicSwirl(ctx, w, h, rng, hue1);
  else if (style === 2) drawCrystalFormation(ctx, w, h, rng, hue1);
  else if (style === 3) drawRuneCircle(ctx, w, h, rng, hue1);
  else if (style === 4) drawEyeOfChaos(ctx, w, h, rng, hue1);
  else drawMysticFlames(ctx, w, h, rng, hue1);

  // Overlay symbol
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.font = '60px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  const symbols = ['🐱', '🌙', '⭐', '🔮', '👁️', '🌀', '✨', '🐾', '🌊', '🔥', '💀', '🦋'];
  ctx.fillText(symbols[Math.floor(rng() * symbols.length)], w/2, h/2);
  ctx.restore();

  // Vignette
  const vig = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.75);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, w, h);

  // Border
  ctx.strokeStyle = `hsla(${hue1}, 60%, 50%, 0.4)`;
  ctx.lineWidth = 2;
  ctx.strokeRect(4, 4, w-8, h-8);
}

function drawSacredGeometry(ctx, w, h, rng, hue) {
  const cx = w/2, cy = h/2;
  const layers = 3 + Math.floor(rng() * 4);
  for (let l = 0; l < layers; l++) {
    const sides = 3 + Math.floor(rng() * 6);
    const radius = 20 + rng() * 50;
    const rotation = rng() * Math.PI * 2;
    ctx.beginPath();
    for (let i = 0; i <= sides; i++) {
      const a = rotation + (i / sides) * Math.PI * 2;
      const x = cx + Math.cos(a) * radius;
      const y = cy + Math.sin(a) * radius;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = `hsla(${(hue + l * 40) % 360}, 70%, 60%, ${0.3 + rng() * 0.3})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Connect vertices
    for (let i = 0; i < sides; i++) {
      for (let j = i + 2; j < sides; j++) {
        if (rng() > 0.5) continue;
        const a1 = rotation + (i / sides) * Math.PI * 2;
        const a2 = rotation + (j / sides) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a1) * radius, cy + Math.sin(a1) * radius);
        ctx.lineTo(cx + Math.cos(a2) * radius, cy + Math.sin(a2) * radius);
        ctx.strokeStyle = `hsla(${(hue + l * 40 + 20) % 360}, 50%, 50%, 0.15)`;
        ctx.stroke();
      }
    }
  }
  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${hue}, 80%, 70%, 0.8)`;
  ctx.fill();
}

function drawCosmicSwirl(ctx, w, h, rng, hue) {
  const cx = w/2, cy = h/2;
  const arms = 2 + Math.floor(rng() * 4);
  const twist = 2 + rng() * 4;
  for (let a = 0; a < arms; a++) {
    const baseAngle = (a / arms) * Math.PI * 2;
    ctx.beginPath();
    for (let t = 0; t < 100; t++) {
      const r = t * 0.7;
      const angle = baseAngle + t * 0.05 * twist;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      t === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `hsla(${(hue + a * 60) % 360}, 70%, 60%, 0.4)`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  // Scattered stars
  for (let i = 0; i < 30; i++) {
    const x = rng() * w, y = rng() * h;
    ctx.beginPath();
    ctx.arc(x, y, rng() * 2, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue + rng() * 60}, 60%, 80%, ${rng() * 0.6})`;
    ctx.fill();
  }
}

function drawCrystalFormation(ctx, w, h, rng, hue) {
  const numCrystals = 3 + Math.floor(rng() * 5);
  for (let c = 0; c < numCrystals; c++) {
    const cx = 30 + rng() * (w - 60);
    const cy = 40 + rng() * (h - 60);
    const cw = 8 + rng() * 20;
    const ch = 20 + rng() * 50;
    const angle = -0.5 + rng();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, -ch/2);
    ctx.lineTo(cw/2, -ch/4);
    ctx.lineTo(cw/2, ch/4);
    ctx.lineTo(0, ch/2);
    ctx.lineTo(-cw/2, ch/4);
    ctx.lineTo(-cw/2, -ch/4);
    ctx.closePath();
    const grad = ctx.createLinearGradient(-cw/2, -ch/2, cw/2, ch/2);
    grad.addColorStop(0, `hsla(${(hue + c * 30) % 360}, 70%, 60%, 0.3)`);
    grad.addColorStop(1, `hsla(${(hue + c * 30 + 40) % 360}, 50%, 30%, 0.2)`);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = `hsla(${(hue + c * 30) % 360}, 80%, 70%, 0.5)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
}

function drawRuneCircle(ctx, w, h, rng, hue) {
  const cx = w/2, cy = h/2;
  // Outer circle
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.strokeStyle = `hsla(${hue}, 60%, 50%, 0.4)`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Inner circle
  ctx.beginPath();
  ctx.arc(cx, cy, 40, 0, Math.PI * 2);
  ctx.stroke();
  // Rune-like marks
  const marks = 6 + Math.floor(rng() * 8);
  for (let i = 0; i < marks; i++) {
    const a = (i / marks) * Math.PI * 2;
    const r1 = 40, r2 = 60;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    ctx.strokeStyle = `hsla(${(hue + i * 20) % 360}, 70%, 60%, 0.5)`;
    ctx.stroke();
    // Small symbol
    const sx = cx + Math.cos(a) * 50;
    const sy = cy + Math.sin(a) * 50;
    const runeChars = '☽☾✧◇△▽○◈♦⟡⊕⊗';
    ctx.font = '10px serif';
    ctx.fillStyle = `hsla(${(hue + i * 20) % 360}, 80%, 70%, 0.7)`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(runeChars[Math.floor(rng() * runeChars.length)], sx, sy);
  }
}

function drawEyeOfChaos(ctx, w, h, rng, hue) {
  const cx = w/2, cy = h/2;
  // Eye shape
  ctx.beginPath();
  ctx.moveTo(cx - 60, cy);
  ctx.quadraticCurveTo(cx, cy - 40, cx + 60, cy);
  ctx.quadraticCurveTo(cx, cy + 40, cx - 60, cy);
  ctx.closePath();
  ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.5)`;
  ctx.lineWidth = 2;
  ctx.stroke();
  // Iris
  const irisR = 18;
  for (let r = irisR; r > 0; r -= 3) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(hue + (irisR - r) * 10) % 360}, 80%, ${30 + r * 2}%, 0.4)`;
    ctx.fill();
  }
  // Pupil
  ctx.beginPath();
  ctx.ellipse(cx, cy, 3, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  // Radiating lines
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * 20, cy + Math.sin(a) * 20);
    ctx.lineTo(cx + Math.cos(a) * (30 + rng() * 20), cy + Math.sin(a) * (30 + rng() * 20));
    ctx.strokeStyle = `hsla(${(hue + i * 30) % 360}, 60%, 50%, 0.3)`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawMysticFlames(ctx, w, h, rng, hue) {
  const flames = 5 + Math.floor(rng() * 8);
  for (let f = 0; f < flames; f++) {
    const fx = 20 + rng() * (w - 40);
    const fy = h - 20 - rng() * 40;
    const fh = 30 + rng() * 60;
    const fw = 8 + rng() * 15;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.quadraticCurveTo(fx - fw, fy - fh * 0.6, fx - fw * 0.3, fy - fh);
    ctx.quadraticCurveTo(fx, fy - fh * 0.7, fx + fw * 0.3, fy - fh);
    ctx.quadraticCurveTo(fx + fw, fy - fh * 0.6, fx, fy);
    const grad = ctx.createLinearGradient(fx, fy, fx, fy - fh);
    grad.addColorStop(0, `hsla(${hue}, 80%, 50%, 0.4)`);
    grad.addColorStop(0.5, `hsla(${(hue + 30) % 360}, 90%, 60%, 0.3)`);
    grad.addColorStop(1, `hsla(${(hue + 60) % 360}, 70%, 70%, 0.1)`);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  // Embers
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    ctx.arc(rng() * w, rng() * h, rng() * 2, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue + rng() * 40}, 90%, 70%, ${rng() * 0.5})`;
    ctx.fill();
  }
}

// Seeded RNG
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

// === CARD DRAWING LOGIC ===
let currentSpread = 1;
let drawnCards = [];
let flippedCount = 0;

document.querySelectorAll('.spread-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSpread = parseInt(btn.dataset.spread);
  });
});

function drawRandomCard(usedIndices) {
  // 70% major arcana, 30% minor
  const isMajor = Math.random() < 0.45;
  const isReversed = Math.random() < 0.3;

  if (isMajor) {
    let idx;
    do { idx = Math.floor(Math.random() * MAJOR_ARCANA.length); } while (usedIndices.has('major-' + idx));
    usedIndices.add('major-' + idx);
    const card = MAJOR_ARCANA[idx];
    return {
      type: 'major',
      name: card.name,
      numeral: card.numeral,
      meaning: isReversed ? card.reversed : card.upright,
      reversed: isReversed,
      seed: Math.floor(Math.random() * 999999),
      art: card.art,
    };
  } else {
    const suit = MINOR_SUITS[Math.floor(Math.random() * MINOR_SUITS.length)];
    let num;
    do { num = 1 + Math.floor(Math.random() * 14); } while (usedIndices.has('minor-' + suit.name + '-' + num));
    usedIndices.add('minor-' + suit.name + '-' + num);
    const m = MINOR_MEANINGS[num];
    const names = { 11: 'Page', 12: 'Knight', 13: 'Queen', 14: 'King' };
    const displayName = num <= 10 ? `${num} of ${suit.name}` : `${names[num]} of ${suit.name}`;
    const meaning = (isReversed ? m.rev : m.up).replace('{element}', suit.element);
    return {
      type: 'minor',
      name: displayName,
      numeral: suit.symbol,
      meaning: meaning,
      reversed: isReversed,
      seed: Math.floor(Math.random() * 999999),
      suit: suit,
    };
  }
}

document.getElementById('drawBtn').addEventListener('click', () => {
  const spread = document.getElementById('cardSpread');
  const reading = document.getElementById('readingContainer');
  spread.innerHTML = '';
  reading.innerHTML = '';
  drawnCards = [];
  flippedCount = 0;

  const positions = SPREAD_POSITIONS[currentSpread];
  const usedIndices = new Set();

  for (let i = 0; i < currentSpread; i++) {
    const card = drawRandomCard(usedIndices);
    card.position = positions[i];
    drawnCards.push(card);

    const cardEl = document.createElement('div');
    cardEl.className = 'tarot-card';
    cardEl.dataset.index = i;
    cardEl.innerHTML = `
      <div class="card-face card-back">
        <div class="card-back-pattern">
          <span class="card-back-symbol">🐱</span>
        </div>
      </div>
      <div class="card-face card-front">
        <div class="card-numeral">${card.numeral}</div>
        <div class="card-art"><canvas></canvas></div>
        <div class="card-name">${card.name}</div>
        <div class="card-position">${card.position}</div>
        ${card.reversed ? '<div class="card-reversed">⟲ Reversed</div>' : ''}
      </div>
    `;

    // Stagger appearance
    cardEl.style.opacity = '0';
    cardEl.style.transform = 'translateY(30px)';
    setTimeout(() => {
      cardEl.style.transition = 'opacity 0.5s, transform 0.5s';
      cardEl.style.opacity = '1';
      cardEl.style.transform = 'translateY(0)';
    }, i * 200 + 100);

    cardEl.addEventListener('click', () => {
      if (cardEl.classList.contains('flipped')) return;
      cardEl.classList.add('flipped');

      // Draw art on the canvas
      const artCanvas = cardEl.querySelector('.card-art canvas');
      drawCardArt(artCanvas, card, card.seed);

      // If reversed, flip the art canvas upside down
      if (card.reversed) {
        artCanvas.style.transform = 'rotate(180deg)';
      }

      flippedCount++;
      // Show reading for this card
      setTimeout(() => showReading(card, i), 600);
    });

    spread.appendChild(cardEl);
  }
});

function showReading(card, index) {
  const container = document.getElementById('readingContainer');
  const wisdom = CHAOS_WISDOM[Math.floor(Math.random() * CHAOS_WISDOM.length)];
  const detail = document.createElement('div');
  detail.className = 'reading-card-detail';
  detail.style.animationDelay = `${index * 0.1}s`;
  detail.innerHTML = `
    <div class="position-label">${card.position}</div>
    <h3>${card.name} ${card.reversed ? '⟲ (Reversed)' : ''}</h3>
    <div class="meaning">${card.meaning}</div>
    <div class="chaos-wisdom">"${wisdom}" — The Chaos Cat Oracle</div>
  `;
  container.appendChild(detail);
}

// Auto-draw on load for instant gratification
setTimeout(() => document.getElementById('drawBtn').click(), 800);
</script>
