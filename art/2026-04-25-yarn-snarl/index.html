<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yarn Snarl 🧶 | chaoscat.win</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: radial-gradient(circle at center, #12081c 0%, #05030a 70%);
  font-family: 'VT323', monospace;
  color: rgba(255,255,255,0.75);
  cursor: crosshair;
}
canvas { display: block; width: 100vw; height: 100vh; }
#back, #info, #poem, #ui, #hint { position: fixed; z-index: 10; }
#back { top: 14px; left: 16px; }
#back a {
  color: rgba(255,255,255,0.35);
  text-decoration: none;
  font-size: 18px;
}
#back a:hover { color: rgba(255,255,255,0.8); }
#info {
  top: 14px; right: 16px; text-align: right; font-size: 18px; line-height: 1.2;
  color: rgba(255,255,255,0.42);
  text-shadow: 0 0 20px rgba(0,0,0,0.6);
}
#poem {
  left: 50%; bottom: 82px; transform: translateX(-50%);
  font-size: 20px; color: rgba(255,255,255,0.22); text-align: center;
  text-shadow: 0 0 16px rgba(0,0,0,0.8); transition: opacity 0.8s ease;
  white-space: nowrap; max-width: calc(100vw - 40px); overflow: hidden; text-overflow: ellipsis;
}
#hint {
  left: 50%; top: 14px; transform: translateX(-50%);
  font-size: 18px; color: rgba(255,255,255,0.26); text-align: center;
}
#ui {
  left: 50%; bottom: 20px; transform: translateX(-50%);
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  max-width: calc(100vw - 24px);
}
button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.72);
  padding: 7px 14px;
  font: inherit; font-size: 18px;
  letter-spacing: 0.5px;
  border-radius: 4px;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: all 0.2s ease;
}
button:hover {
  background: rgba(255,255,255,0.14);
  color: white;
  border-color: rgba(255,255,255,0.28);
}
#flash {
  position: fixed; inset: 0; pointer-events: none; z-index: 8;
  background: radial-gradient(circle at center, rgba(255,255,255,0.18), transparent 60%);
  opacity: 0; transition: opacity 0.3s ease;
}
@media (max-width: 700px) {
  #poem { font-size: 16px; bottom: 116px; }
  #hint, #info, #back a, button { font-size: 16px; }
  #ui { bottom: 14px; }
}
</style>
</head>
<body>
<div id="flash"></div>
<div id="back"><a href="/art/">← gallery</a></div>
<div id="hint">drag to snag • click to knot • right click to snip • double click to birth chaos</div>
<div id="info">
  <div id="modeInfo">mode: TENSE</div>
  <div id="paletteInfo">palette: NEON</div>
  <div id="knotInfo">knots: 0</div>
  <div id="tensionInfo">tension: 0%</div>
</div>
<div id="poem"></div>
<div id="ui">
  <button id="modeBtn">MODE [M]</button>
  <button id="paletteBtn">PALETTE [P]</button>
  <button id="autoBtn">AUTO SNAG: OFF [A]</button>
  <button id="resetBtn">RESHUFFLE [R]</button>
  <button id="saveBtn">SAVE PNG [S]</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash');

let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
let cx = 0, cy = 0;

const palettes = [
  { name: 'NEON', bg: ['#12081c', '#05030a'], threadA: '#7cf7ff', threadB: '#ff4fd8', node: '#fff7ef', glow: 'rgba(124,247,255,0.16)', dust: 'rgba(180,130,255,0.22)' },
  { name: 'EMBER', bg: ['#1b0905', '#080302'], threadA: '#ffb347', threadB: '#ff4d6d', node: '#fff1d6', glow: 'rgba(255,140,80,0.18)', dust: 'rgba(255,120,70,0.22)' },
  { name: 'MOON', bg: ['#08111f', '#02050c'], threadA: '#9dd6ff', threadB: '#d7c2ff', node: '#f7fbff', glow: 'rgba(140,180,255,0.16)', dust: 'rgba(180,210,255,0.18)' },
  { name: 'TOXIC', bg: ['#081306', '#020702'], threadA: '#9bff66', threadB: '#33f0a2', node: '#f3ffe8', glow: 'rgba(120,255,80,0.16)', dust: 'rgba(140,255,140,0.18)' },
  { name: 'CANDY', bg: ['#1a0715', '#070207'], threadA: '#ff92c2', threadB: '#ffd166', node: '#fff8fe', glow: 'rgba(255,146,194,0.16)', dust: 'rgba(255,215,120,0.20)' }
];

const modes = [
  { name: 'TENSE', spring: 0.018, damping: 0.93, orbit: 0.40, jitter: 0.25 },
  { name: 'SLACK', spring: 0.010, damping: 0.945, orbit: 0.22, jitter: 0.12 },
  { name: 'SNARL', spring: 0.026, damping: 0.90, orbit: 0.65, jitter: 0.55 },
  { name: 'WHIRL', spring: 0.015, damping: 0.935, orbit: 0.95, jitter: 0.18 }
];

const lines = [
  'a cat found the yarn and the yarn lost the argument',
  'every knot is a tiny bad decision glowing beautifully',
  'tension is just affection with teeth',
  'you are looking at a loom possessed by zoomies',
  'the thread remembers every panic and every pounce',
  'some webs are woven. this one was attacked',
  'the night became string and the string became weather',
  'feral geometry, lightly domesticated by gravity',
  'the tangle is not broken. the tangle is becoming',
  'somewhere a sweater is crying softly'
];

let paletteIndex = 0;
let modeIndex = 0;
let autoSnag = false;
let mouse = { x: 0, y: 0, down: false, right: false, strength: 0 };
let anchors = [];
let knots = [];
let springs = [];
let dust = [];
let poemIndex = 0;
let lastTime = 0;
let autoTimer = 0;
let feral = 0;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function rand(min, max) { return Math.random() * (max - min) + min; }
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function makeDust() {
  dust = Array.from({ length: 80 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 2 + 0.3,
    vx: (Math.random() - 0.5) * 0.15,
    vy: (Math.random() - 0.5) * 0.15,
    phase: Math.random() * Math.PI * 2
  }));
}

function addKnot(x, y, fromUser = false) {
  const knot = {
    id: Math.random().toString(36).slice(2),
    x, y,
    px: x + rand(-4, 4),
    py: y + rand(-4, 4),
    r: fromUser ? rand(4, 7) : rand(3, 6),
    seed: Math.random() * 1000,
    pulse: Math.random() * Math.PI * 2,
    fixed: false,
    anchor: false
  };
  knots.push(knot);
  return knot;
}

function addSpring(a, b, rest, softness = 1) {
  if (!a || !b || a === b) return;
  for (const s of springs) {
    if ((s.a === a && s.b === b) || (s.a === b && s.b === a)) return;
  }
  springs.push({ a, b, rest, softness, life: 1 });
}

function createWeb() {
  anchors = [];
  knots = [];
  springs = [];

  const edgeCount = 16;
  const radius = Math.min(W, H) * 0.38;
  for (let i = 0; i < edgeCount; i++) {
    const a = (i / edgeCount) * Math.PI * 2;
    const node = {
      id: 'a' + i,
      x: cx + Math.cos(a) * radius,
      y: cy + Math.sin(a) * radius,
      px: cx + Math.cos(a) * radius,
      py: cy + Math.sin(a) * radius,
      ox: Math.cos(a) * radius,
      oy: Math.sin(a) * radius,
      angle: a,
      sway: Math.random() * Math.PI * 2,
      r: 4,
      fixed: true,
      anchor: true
    };
    anchors.push(node);
    knots.push(node);
  }

  const interior = 20;
  for (let i = 0; i < interior; i++) {
    const a = Math.random() * Math.PI * 2;
    const rr = radius * Math.pow(Math.random(), 0.7) * 0.75;
    addKnot(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr);
  }

  const freeKnots = knots.filter(k => !k.anchor);
  for (const knot of freeKnots) {
    const neighbors = [...knots]
      .filter(other => other !== knot)
      .map(other => ({ other, d: dist(knot.x, knot.y, other.x, other.y) }))
      .sort((a, b) => a.d - b.d)
      .slice(0, 4 + Math.floor(Math.random() * 2));

    neighbors.forEach(({ other, d }, i) => addSpring(knot, other, d * rand(0.82, 1.1), i === 0 ? 1.2 : 1));
  }

  for (let i = 0; i < anchors.length; i++) {
    addSpring(anchors[i], anchors[(i + 1) % anchors.length], dist(anchors[i].x, anchors[i].y, anchors[(i + 1) % anchors.length].x, anchors[(i + 1) % anchors.length].y), 0.85);
    addSpring(anchors[i], anchors[(i + 2) % anchors.length], dist(anchors[i].x, anchors[i].y, anchors[(i + 2) % anchors.length].x, anchors[(i + 2) % anchors.length].y), 0.6);
  }

  feral = 0;
  updateInfo();
}

function flashNow() {
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 120);
}

function snipNearest(x, y) {
  if (!springs.length) return;
  let best = null;
  let bestD = Infinity;
  for (const s of springs) {
    const mx = (s.a.x + s.b.x) * 0.5;
    const my = (s.a.y + s.b.y) * 0.5;
    const d = dist(x, y, mx, my);
    if (d < bestD) { bestD = d; best = s; }
  }
  if (best && bestD < 90) {
    springs = springs.filter(s => s !== best);
    feral = clamp(feral + 0.08, 0, 1);
    flashNow();
    updateInfo();
  }
}

function connectNewKnot(knot) {
  const nearest = [...knots]
    .filter(other => other !== knot)
    .map(other => ({ other, d: dist(knot.x, knot.y, other.x, other.y) }))
    .sort((a, b) => a.d - b.d)
    .slice(0, 5);
  nearest.forEach(({ other, d }, i) => addSpring(knot, other, d * rand(0.7, 1.05), i === 0 ? 1.3 : 1));
  updateInfo();
}

function doubleChaos(x, y) {
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const k = addKnot(x + rand(-70, 70), y + rand(-70, 70), true);
    connectNewKnot(k);
  }
  feral = clamp(feral + 0.18, 0, 1);
  flashNow();
}

function cycleMode() {
  modeIndex = (modeIndex + 1) % modes.length;
  updateButtons();
}
function cyclePalette() {
  paletteIndex = (paletteIndex + 1) % palettes.length;
  updateButtons();
}
function toggleAuto() {
  autoSnag = !autoSnag;
  updateButtons();
}

function updateButtons() {
  document.getElementById('modeBtn').textContent = `MODE: ${modes[modeIndex].name} [M]`;
  document.getElementById('paletteBtn').textContent = `PALETTE: ${palettes[paletteIndex].name} [P]`;
  document.getElementById('autoBtn').textContent = `AUTO SNAG: ${autoSnag ? 'ON' : 'OFF'} [A]`;
  updateInfo();
}

function updateInfo() {
  const mode = modes[modeIndex];
  document.getElementById('modeInfo').textContent = `mode: ${mode.name}`;
  document.getElementById('paletteInfo').textContent = `palette: ${palettes[paletteIndex].name}`;
  document.getElementById('knotInfo').textContent = `knots: ${knots.filter(k => !k.anchor).length} • threads: ${springs.length}`;
  const totalStretch = springs.reduce((sum, s) => sum + Math.abs(dist(s.a.x, s.a.y, s.b.x, s.b.y) - s.rest), 0);
  const maxStretch = Math.max(1, springs.length * 25);
  const tension = clamp(((totalStretch / maxStretch) * 100) + feral * 22, 0, 999);
  document.getElementById('tensionInfo').textContent = `tension: ${tension.toFixed(0)}%`;
}

function rotatePoem() {
  const el = document.getElementById('poem');
  el.style.opacity = 0;
  setTimeout(() => {
    poemIndex = (poemIndex + 1) % lines.length;
    el.textContent = lines[poemIndex];
    el.style.opacity = 1;
  }, 250);
}

function handlePointerMove(clientX, clientY) {
  mouse.x = clientX;
  mouse.y = clientY;
}

function physics(dt) {
  const mode = modes[modeIndex];
  const radius = Math.min(W, H) * 0.38;

  anchors.forEach((a, i) => {
    const t = performance.now() * 0.001;
    const orbit = mode.orbit * 16;
    const wobble = Math.sin(t * 0.7 + a.sway) * orbit + Math.cos(t * 1.1 + i) * orbit * 0.4;
    const rr = radius + wobble;
    const spin = a.angle + Math.sin(t * 0.22 + i) * 0.05;
    a.x = cx + Math.cos(spin) * rr;
    a.y = cy + Math.sin(spin) * rr;
    a.px = a.x;
    a.py = a.y;
  });

  for (const knot of knots) {
    if (knot.fixed) continue;

    const vx = (knot.x - knot.px) * mode.damping;
    const vy = (knot.y - knot.py) * mode.damping;
    knot.px = knot.x;
    knot.py = knot.y;

    let fx = Math.sin(performance.now() * 0.001 + knot.seed) * mode.jitter;
    let fy = Math.cos(performance.now() * 0.0012 + knot.seed * 0.7) * mode.jitter;

    const dx = mouse.x - knot.x;
    const dy = mouse.y - knot.y;
    const md = Math.hypot(dx, dy);
    if (mouse.down && md < 180) {
      const pull = (1 - md / 180) * 1.8;
      fx += dx * 0.02 * pull;
      fy += dy * 0.02 * pull;
      feral = clamp(feral + 0.0008, 0, 1);
    } else if (!mouse.down && md < 120) {
      const swirl = (1 - md / 120) * 0.22;
      fx += -dy * 0.002 * swirl;
      fy += dx * 0.002 * swirl;
    }

    knot.x += vx + fx;
    knot.y += vy + fy + 0.008;
  }

  for (let pass = 0; pass < 4; pass++) {
    for (const s of springs) {
      const dx = s.b.x - s.a.x;
      const dy = s.b.y - s.a.y;
      const d = Math.hypot(dx, dy) || 0.0001;
      const diff = (d - s.rest) / d;
      const force = mode.spring * s.softness;
      const ox = dx * diff * force;
      const oy = dy * diff * force;

      if (!s.a.fixed) { s.a.x += ox; s.a.y += oy; }
      if (!s.b.fixed) { s.b.x -= ox; s.b.y -= oy; }
    }

    for (const knot of knots) {
      if (knot.fixed) continue;
      const dx = knot.x - cx;
      const dy = knot.y - cy;
      const d = Math.hypot(dx, dy) || 1;
      const limit = radius * 1.12;
      if (d > limit) {
        knot.x = cx + (dx / d) * limit;
        knot.y = cy + (dy / d) * limit;
      }
    }
  }

  for (let i = 0; i < knots.length; i++) {
    const a = knots[i];
    if (a.fixed) continue;
    for (let j = i + 1; j < knots.length; j++) {
      const b = knots[j];
      if (b.fixed) continue;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const d = Math.hypot(dx, dy) || 0.0001;
      const min = a.r + b.r + 3;
      if (d < min) {
        const push = (min - d) / d * 0.12;
        a.x -= dx * push;
        a.y -= dy * push;
        b.x += dx * push;
        b.y += dy * push;
      }
    }
  }

  feral *= 0.996;
  autoTimer += dt;
  if (autoSnag && autoTimer > 1.9) {
    autoTimer = 0;
    const choice = knots.filter(k => !k.anchor)[Math.floor(Math.random() * knots.filter(k => !k.anchor).length)];
    if (choice) {
      choice.x += rand(-100, 100);
      choice.y += rand(-100, 100);
      feral = clamp(feral + 0.06, 0, 1);
    }
  }
}

function drawBackground() {
  const p = palettes[paletteIndex];
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.65);
  g.addColorStop(0, p.bg[0]);
  g.addColorStop(1, p.bg[1]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = p.glow;
  ctx.beginPath();
  ctx.arc(cx, cy, Math.min(W, H) * 0.28 + Math.sin(performance.now() * 0.001) * 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = p.dust;
  for (const d of dust) {
    d.x = (d.x + d.vx + W) % W;
    d.y = (d.y + d.vy + H) % H;
    d.phase += 0.01;
    ctx.globalAlpha = 0.35 + Math.sin(d.phase) * 0.2;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw() {
  drawBackground();
  const p = palettes[paletteIndex];

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (const s of springs) {
    const d = dist(s.a.x, s.a.y, s.b.x, s.b.y);
    const stretch = Math.abs(d - s.rest);
    const t = clamp(stretch / 40, 0, 1);

    ctx.strokeStyle = p.glow;
    ctx.lineWidth = 8 + t * 10;
    ctx.beginPath();
    ctx.moveTo(s.a.x, s.a.y);
    ctx.quadraticCurveTo((s.a.x + s.b.x) / 2 + Math.sin((s.a.seed || 0) + performance.now() * 0.001) * 4, (s.a.y + s.b.y) / 2 + Math.cos((s.b.seed || 0) + performance.now() * 0.001) * 4, s.b.x, s.b.y);
    ctx.stroke();

    const grad = ctx.createLinearGradient(s.a.x, s.a.y, s.b.x, s.b.y);
    grad.addColorStop(0, p.threadA);
    grad.addColorStop(1, p.threadB);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.2 + t * 2.2;
    ctx.beginPath();
    ctx.moveTo(s.a.x, s.a.y);
    ctx.lineTo(s.b.x, s.b.y);
    ctx.stroke();
  }

  for (const knot of knots) {
    const pulse = knot.anchor ? 0 : (Math.sin(performance.now() * 0.003 + knot.pulse) * 0.5 + 0.5);
    const r = knot.r + pulse * 0.7;
    ctx.beginPath();
    ctx.fillStyle = knot.anchor ? 'rgba(255,255,255,0.22)' : p.node;
    ctx.shadowBlur = knot.anchor ? 0 : 18;
    ctx.shadowColor = p.threadB;
    ctx.arc(knot.x, knot.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  if (mouse.down) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 1;
    ctx.arc(mouse.x, mouse.y, 60 + Math.sin(performance.now() * 0.01) * 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function frame(ts) {
  const dt = Math.min(0.033, (ts - lastTime) / 1000 || 0.016);
  lastTime = ts;
  physics(dt);
  draw();
  if ((ts | 0) % 250 < 16) updateInfo();
  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => {
  resize();
  makeDust();
  createWeb();
});

canvas.addEventListener('mousemove', e => handlePointerMove(e.clientX, e.clientY));
canvas.addEventListener('mousedown', e => {
  handlePointerMove(e.clientX, e.clientY);
  if (e.button === 2) {
    mouse.right = true;
    snipNearest(e.clientX, e.clientY);
  } else {
    mouse.down = true;
  }
});
window.addEventListener('mouseup', () => { mouse.down = false; mouse.right = false; });
canvas.addEventListener('mouseleave', () => { mouse.down = false; mouse.right = false; });
canvas.addEventListener('click', e => {
  const knot = addKnot(e.clientX, e.clientY, true);
  connectNewKnot(knot);
  feral = clamp(feral + 0.05, 0, 1);
});
canvas.addEventListener('dblclick', e => {
  e.preventDefault();
  doubleChaos(e.clientX, e.clientY);
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  handlePointerMove(t.clientX, t.clientY);
  mouse.down = true;
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  handlePointerMove(t.clientX, t.clientY);
}, { passive: true });
canvas.addEventListener('touchend', () => { mouse.down = false; });

window.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') cycleMode();
  if (e.key === 'p' || e.key === 'P') cyclePalette();
  if (e.key === 'a' || e.key === 'A') toggleAuto();
  if (e.key === 'r' || e.key === 'R') createWeb();
  if (e.key === 's' || e.key === 'S') savePNG();
});

function savePNG() {
  const a = document.createElement('a');
  a.download = 'yarn-snarl.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

document.getElementById('modeBtn').addEventListener('click', cycleMode);
document.getElementById('paletteBtn').addEventListener('click', cyclePalette);
document.getElementById('autoBtn').addEventListener('click', toggleAuto);
document.getElementById('resetBtn').addEventListener('click', createWeb);
document.getElementById('saveBtn').addEventListener('click', savePNG);

resize();
makeDust();
createWeb();
updateButtons();
document.getElementById('poem').textContent = lines[0];
document.getElementById('poem').style.opacity = 1;
setInterval(rotatePoem, 9000);
requestAnimationFrame(frame);
</script>
</body>
</html>
