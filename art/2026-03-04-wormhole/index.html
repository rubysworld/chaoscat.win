<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORMHOLE — chaoscat.win</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
canvas { display: block; }
#ui {
  position: fixed; top: 20px; left: 20px; z-index: 10;
  color: #0ff; font-size: 13px; text-shadow: 0 0 8px #0ff;
  pointer-events: none; user-select: none;
}
#ui h1 { font-size: 22px; letter-spacing: 6px; margin-bottom: 4px; }
#ui .sub { color: #088; font-size: 11px; margin-bottom: 12px; }
#controls {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 12px; align-items: center;
}
.btn {
  background: transparent; border: 1px solid #0ff; color: #0ff;
  padding: 6px 16px; font-family: 'Courier New', monospace; font-size: 12px;
  cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
  transition: all 0.2s;
}
.btn:hover { background: #0ff; color: #000; }
.btn.active { background: #0ff; color: #000; }
#speed-display {
  position: fixed; top: 20px; right: 20px; z-index: 10;
  color: #0ff; font-family: 'Courier New', monospace; font-size: 12px;
  text-shadow: 0 0 8px #0ff; text-align: right;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="ui">
  <h1>WORMHOLE</h1>
  <div class="sub">chaoscat.win — move mouse to steer</div>
</div>
<div id="speed-display">
  <div id="speed-val">SPEED: 1.0x</div>
  <div id="depth-val">DEPTH: 0.00 AU</div>
  <div id="mode-val">MODE: NEON</div>
</div>
<div id="controls">
  <button class="btn active" data-mode="neon">NEON</button>
  <button class="btn" data-mode="void">VOID</button>
  <button class="btn" data-mode="fire">FIRE</button>
  <button class="btn" data-mode="ice">ICE</button>
  <button class="btn" data-mode="rainbow">RAINBOW</button>
  <button class="btn" data-mode="matrix">MATRIX</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// Mouse
let mx = 0.5, my = 0.5;
document.addEventListener('mousemove', e => {
  mx = e.clientX / W;
  my = e.clientY / H;
});
document.addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX / W;
  my = e.touches[0].clientY / H;
}, { passive: false });

// Speed control via scroll
let speedMult = 1.0;
document.addEventListener('wheel', e => {
  speedMult = Math.max(0.2, Math.min(5, speedMult + e.deltaY * -0.002));
  document.getElementById('speed-val').textContent = `SPEED: ${speedMult.toFixed(1)}x`;
});

// Mode
let mode = 'neon';
const buttons = document.querySelectorAll('.btn');
buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('mode-val').textContent = `MODE: ${mode.toUpperCase()}`;
  });
});

// Tunnel rings
const RINGS = 80;
const SEGMENTS = 48;
let time = 0;
let depth = 0;

function getColor(ring, seg, t) {
  const r = ring / RINGS;
  const s = seg / SEGMENTS;
  switch (mode) {
    case 'neon': {
      const hue = (s * 360 + t * 30 + ring * 8) % 360;
      const light = 30 + r * 40;
      return `hsl(${hue}, 100%, ${light}%)`;
    }
    case 'void': {
      const v = Math.sin(s * Math.PI * 4 + t * 2 + ring * 0.3) * 0.5 + 0.5;
      const b = Math.floor(20 + v * 40 + r * 30);
      return `rgb(${b * 0.3}, ${b * 0.2}, ${b})`;
    }
    case 'fire': {
      const v = Math.sin(s * Math.PI * 2 + t * 3 + ring * 0.5) * 0.5 + 0.5;
      const hue = (v * 40 + r * 20) % 60;
      return `hsl(${hue}, 100%, ${20 + r * 35 + v * 15}%)`;
    }
    case 'ice': {
      const v = Math.sin(s * Math.PI * 6 + t + ring * 0.2) * 0.5 + 0.5;
      const hue = 180 + v * 30 + r * 10;
      return `hsl(${hue}, 80%, ${25 + r * 40}%)`;
    }
    case 'rainbow': {
      const hue = (ring * 12 + t * 50 + s * 120) % 360;
      return `hsl(${hue}, 90%, ${25 + r * 40}%)`;
    }
    case 'matrix': {
      const v = Math.sin(s * Math.PI * 8 + t * 4 + ring * 0.4) * 0.5 + 0.5;
      const g = Math.floor(v * 180 + r * 75);
      return `rgb(0, ${g}, ${Math.floor(g * 0.2)})`;
    }
  }
}

// Stars in the tunnel
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    angle: Math.random() * Math.PI * 2,
    dist: Math.random(),
    z: Math.random() * RINGS,
    brightness: 0.3 + Math.random() * 0.7
  });
}

function draw() {
  const dt = 0.016 * speedMult;
  time += dt;
  depth += dt * 0.1;
  document.getElementById('depth-val').textContent = `DEPTH: ${depth.toFixed(2)} AU`;

  // Slight fade for trail effect
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // Mouse offset for steering
  const offsetX = (mx - 0.5) * 150;
  const offsetY = (my - 0.5) * 150;

  // Draw tunnel from back to front
  for (let ring = RINGS - 1; ring >= 0; ring--) {
    const z = (ring + (time * 8) % 1) / RINGS;
    const scale = 1 / (z * 3 + 0.1);
    const baseRadius = (50 + Math.sin(ring * 0.15 + time * 2) * 20 + Math.cos(ring * 0.1 + time * 1.3) * 15) * scale;
    const wobbleX = Math.sin(ring * 0.2 + time * 1.5) * 30 * (1 - z);
    const wobbleY = Math.cos(ring * 0.17 + time * 1.2) * 30 * (1 - z);
    const centerX = cx + offsetX * (1 - z) + wobbleX;
    const centerY = cy + offsetY * (1 - z) + wobbleY;

    // Ring alpha (fade distant rings)
    const alpha = Math.min(1, (1 - z) * 2);
    ctx.globalAlpha = alpha * 0.8;

    // Draw segments
    for (let seg = 0; seg < SEGMENTS; seg++) {
      const a1 = (seg / SEGMENTS) * Math.PI * 2;
      const a2 = ((seg + 1) / SEGMENTS) * Math.PI * 2;

      // Organic radius variation
      const rv1 = baseRadius * (1 + Math.sin(a1 * 3 + time * 2 + ring * 0.3) * 0.15);
      const rv2 = baseRadius * (1 + Math.sin(a2 * 3 + time * 2 + ring * 0.3) * 0.15);

      const x1 = centerX + Math.cos(a1) * rv1;
      const y1 = centerY + Math.sin(a1) * rv1;
      const x2 = centerX + Math.cos(a2) * rv2;
      const y2 = centerY + Math.sin(a2) * rv2;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = getColor(ring, seg, time);
      ctx.lineWidth = Math.max(1, scale * 0.8);
      ctx.stroke();
    }
  }

  // Draw stars streaking through tunnel
  ctx.globalAlpha = 1;
  for (const star of stars) {
    star.z -= dt * 12;
    if (star.z < 0) {
      star.z = RINGS;
      star.angle = Math.random() * Math.PI * 2;
      star.dist = 0.3 + Math.random() * 0.7;
    }

    const z = star.z / RINGS;
    const scale = 1 / (z * 3 + 0.1);
    const baseR = 50 * scale * star.dist;
    const sx = cx + offsetX * (1 - z) + Math.cos(star.angle) * baseR;
    const sy = cy + offsetY * (1 - z) + Math.sin(star.angle) * baseR;
    const size = Math.max(0.5, (1 - z) * 3);

    ctx.fillStyle = mode === 'matrix' ? `rgba(0, 255, 50, ${star.brightness * (1 - z)})` :
                    mode === 'void' ? `rgba(100, 80, 255, ${star.brightness * (1 - z)})` :
                    mode === 'fire' ? `rgba(255, 200, 50, ${star.brightness * (1 - z)})` :
                    mode === 'ice' ? `rgba(150, 230, 255, ${star.brightness * (1 - z)})` :
                    `rgba(255, 255, 255, ${star.brightness * (1 - z)})`;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();

    // Streak trail
    if (size > 1) {
      const tz = (star.z + 2) / RINGS;
      const tscale = 1 / (tz * 3 + 0.1);
      const tbr = 50 * tscale * star.dist;
      const tx = cx + offsetX * (1 - tz) + Math.cos(star.angle) * tbr;
      const ty = cy + offsetY * (1 - tz) + Math.sin(star.angle) * tbr;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(tx, ty);
      ctx.strokeStyle = ctx.fillStyle;
      ctx.lineWidth = size * 0.5;
      ctx.stroke();
    }
  }

  // Center glow
  const glowSize = 80 + Math.sin(time * 3) * 20;
  const grad = ctx.createRadialGradient(cx + offsetX, cy + offsetY, 0, cx + offsetX, cy + offsetY, glowSize);
  const glowColor = mode === 'fire' ? '255,100,0' : mode === 'ice' ? '0,200,255' :
                    mode === 'void' ? '80,0,200' : mode === 'matrix' ? '0,255,50' : '0,255,255';
  grad.addColorStop(0, `rgba(${glowColor}, 0.3)`);
  grad.addColorStop(0.5, `rgba(${glowColor}, 0.05)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 1;
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
